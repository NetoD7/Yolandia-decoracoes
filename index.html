function renderDanosBody(){
  const q = (document.getElementById('dnSearch').value||'').toLowerCase();
  const rows = DB.ocorrencias.filter(o=>!q || (o.materialNome+clienteNome(o.cliente_id)).toLowerCase().includes(q)).sort((a,b)=>b.data.localeCompare(a.data));
  const totalPrejuizo = DB.ocorrencias.reduce((s,o)=>s+Number(o.valorPrejuizo||0),0);
  const nDanificado = DB.ocorrencias.filter(o=>o.estado==='danificado').length;
  const nPerdido = DB.ocorrencias.filter(o=>o.estado==='perdido').length;
  const nExtraviado = DB.ocorrencias.filter(o=>o.estado==='extraviado').length;
  document.getElementById('dnStats').innerHTML = `
    ${statCard('💥', '#E3453A', nDanificado, 'Materiais danificados')}
    ${statCard('❓', COLORS.amarelo, nPerdido, 'Materiais perdidos')}
    ${statCard('🚫', COLORS.roxo, nExtraviado, 'Extraviados')}
    ${statCard('💸', '#E3453A', fmtMoney(totalPrejuizo), 'Custo total dos prejuízos')}
  `;
  document.getElementById('dnTbody').innerHTML = rows.length? rows.map(o=>`
    <tr>
      <td>${fmtDate(o.data)}</td>
      <td>${escapeHtml(o.materialNome)}</td>
      <td>${escapeHtml(clienteNome(o.cliente_id))}</td>
      <td>${o.quantidade}</td>
      <td>${ocorrenciaBadge(o.estado)}</td>
      <td>${fmtMoney(o.valorPrejuizo)}</td>
      <td style="white-space:nowrap"><button class="btn btn-sm" onclick="viewOcorrencia('${o.id}')">👁</button> <button class="btn btn-sm btn-danger" onclick="delOcorrencia('${o.id}')">🗑</button></td>
    </tr>`).join('') : `<tr><td colspan="7"><div class="empty-state"><div class="em-ic">⚠️</div><div class="em-t">Nenhuma ocorrência registada</div></div></td></tr>`;

  const contagem = {};
  DB.ocorrencias.forEach(o=>{ contagem[o.materialNome] = (contagem[o.materialNome]||0)+1; });
  const frequentes = Object.entries(contagem).filter(([k,v])=>v>=3);
  const existing = document.getElementById('dnFrequentBox');
  if(existing) existing.remove();
  if(frequentes.length){
    const box = document.createElement('div');
    box.id = 'dnFrequentBox';
    box.className='card'; box.style.marginTop='16px';
    box.innerHTML = `<h3 style="margin-bottom:8px">🔧 Sugestão de manutenção preventiva</h3>` + frequentes.map(([n,v])=>`<div style="font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--border)">${escapeHtml(n)} — ${v} ocorrências registadas. Considere manutenção ou substituição.</div>`).join('');
    document.getElementById('dnTbody').closest('.table-wrap').after(box);
  }
}
function ocorrenciaBadge(estado){

  return `<span class="badge ${cls}">${lbl}</span>`;
}

function renderRelatorios(){
  const c = document.getElementById('content');
  const materiaisMaisAlugados = {};
  DB.alugueres.forEach(a=>a.itens.forEach(i=>{ materiaisMaisAlugados[i.nome] = (materiaisMaisAlugados[i.nome]||0)+Number(i.qtd); }));
  const topMateriais = Object.entries(materiaisMaisAlugados).sort((a,b)=>b[1]-a[1]).slice(0,8);
  const consumoPorMaterial = {};
  DB.consumoConsumiveis.forEach(cc=>{ consumoPorMaterial[cc.material] = (consumoPorMaterial[cc.material]||0)+Number(cc.quantidade); });
  const topConsumiveis = Object.entries(consumoPorMaterial).sort((a,b)=>b[1]-a[1]).slice(0,8);

async function exportRelatorioExcel(){
  try{
    const logoPng = await loadLogoPng();
    const wb = new ExcelJS.Workbook();
    wb.creator = 'Yolandia Decorações';
    wb.created = new Date();
    const ws = wb.addWorksheet('Relatório Geral');
    ws.getColumn(1).width = 26; ws.getColumn(2).width = 22; ws.getColumn(3).width = 18;
    ws.getColumn(4).width = 18; ws.getColumn(5).width = 18; ws.getColumn(6).width = 18;
    ws.getColumn(7).width = 20; ws.getColumn(8).width = 16; ws.getColumn(9).width = 16;

    if(logoPng){
      try{
        const base64Data = logoPng.split(',')[1];
        const imgId = wb.addImage({ base64: base64Data, extension: 'png' });
        ws.addImage(imgId, { tl:{col:0,row:0}, ext:{width:78,height:84} });
      }catch(e){}
    }
    ws.mergeCells('C1:H1');
    ws.getCell('C1').value = 'Yolandia Decorações — Relatório Geral';
    ws.getCell('C1').font = { bold:true, size:16, color:{argb:'FF5B2A86'} };
    ws.mergeCells('C2:H2');
    ws.getCell('C2').value = 'Criamos · Decoramos · Encantamos';
    ws.getCell('C2').font = { italic:true, size:10, color:{argb:'FF17A9B0'} };
    ws.mergeCells('C3:H3');
    ws.getCell('C3').value = 'Gerado em ' + new Date().toLocaleDateString('pt-PT') + ' por ' + currentUserName();
    ws.getCell('C3').font = { size:9, color:{argb:'FF6B6178'} };
    for(let r=1;r<=6;r++){ ws.getRow(r).height = r===1?26:18; }

    let r = 8;
    function addTable(title, headers, rows){
      ws.getCell('A'+r).value = title;
      ws.getCell('A'+r).font = { bold:true, size:12, color:{argb:'FF5B2A86'} };
      r++;
      const headerRow = ws.getRow(r);
      headers.forEach((h,i)=>{
        const cell = headerRow.getCell(i+1);
        cell.value = h;
        cell.font = { bold:true, color:{argb:'FFFFFFFF'} };
        cell.fill = { type:'pattern', pattern:'solid', fgColor:{argb:'FF5B2A86'} };
      });
      r++;
      if(rows.length===0){
        ws.getCell('A'+r).value = 'Sem dados';
        ws.getCell('A'+r).font = { italic:true, color:{argb:'FF6B6178'} };
        r++;
      } else {
        rows.forEach(row=>{
          const rr = ws.getRow(r);
          row.forEach((v,i)=>{ rr.getCell(i+1).value = v; });
          r++;
        });
      }
      r += 2;
    }

    addTable('Materiais mais alugados', ['Material','Quantidade'], Object.entries(materiaisMaisAlugadosGlobal()));
    addTable('Consumíveis mais utilizados', ['Consumível','Quantidade'], Object.entries(consumoPorMaterialGlobal()));
    addTable('Folhas de Custo / Facturas Proforma', ['Número','Cliente','Data','Custo','Retenção','Total','Status'],
      DB.facturas.map(f=>[f.numero, clienteNome(f.cliente_id), fmtDate(f.data), Number(f.subtotal||0), Number(f.valorRetencao||0), Number(f.total||0), f.status]));
    addTable('Despesas', ['Data','Categoria','Descrição','Valor'],
      DB.despesas.map(d=>[fmtDate(d.data), d.categoria, d.descricao, Number(d.valor||0)]));
    addTable('Ocorrências (Danos/Perdas)', ['Data','Material','Estado','Quantidade','Prejuízo'],
      DB.ocorrencias.map(o=>[fmtDate(o.data), o.materialNome, o.estado, o.quantidade, Number(o.valorPrejuizo||0)]));
    addTable('Lista de Compras/Aluguer', ['Material','Categoria','Qtd','Unidade','Valor Unit.','Subtotal','Fornecedor','Tipo','Status'],
      DB.listaCompras.map(l=>[l.materialNome, l.categoria, l.quantidade, l.unidade, Number(l.valorUnitario||0), Number(l.quantidade||0)*Number(l.valorUnitario||0), fornecedorNome(l.fornecedor_id), l.tipoAquisicao==='aluguer'?'Aluguer':'Compra', listaCompraEstadoTexto(l.status)]));
    addTable('Fornecedores', ['Nome','Empresa','Telefone','Email'],
      DB.fornecedores.map(f=>[f.nome, f.empresa, f.telefone, f.email]));

    const buf = await wb.xlsx.writeBuffer();
    const blob = new Blob([buf], {type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    const link = document.createElement('a');
    link.href = URL.createObjectURL(blob);
    link.download = 'Relatorio_Yolandia_Decoracoes.xlsx';
    link.click();
    toast('Relatório exportado em Excel com logotipo.','ok');
  }catch(e){
    console.error(e);
    toast('Erro ao gerar o ficheiro Excel.','err');
  }
}
function materiaisMaisAlugadosGlobal(){
  const materiaisMaisAlugados = {};
  DB.alugueres.forEach(a=>a.itens.forEach(i=>{ materiaisMaisAlugados[i.nome] = (materiaisMaisAlugados[i.nome]||0)+Number(i.qtd); }));
  return materiaisMaisAlugados;
}
function consumoPorMaterialGlobal(){
  const consumoPorMaterial = {};
  DB.consumoConsumiveis.forEach(cc=>{ consumoPorMaterial[cc.material] = (consumoPorMaterial[cc.material]||0)+Number(cc.quantidade); });
  return consumoPorMaterial;
}
async function exportRelatorioPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const logoPng = await loadLogoPng();
  if(logoPng){ try{ doc.addImage(logoPng, 'PNG', 15, 8, 18, 18); }catch(e){} }
  doc.setFontSize(15); doc.setTextColor(91,42,134);
  doc.text('Relatório Geral', 40, 16);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text(DB.config.empresa.nome+' — Gerado em '+new Date().toLocaleDateString('pt-PT'), 40, 22);
  let y = 32;
  doc.setFontSize(11); doc.setTextColor(20); doc.text('Materiais mais alugados', 15, y); y+=4;
  doc.autoTable({startY:y, head:[['Material','Qtd']], body:Object.entries(materiaisMaisAlugadosGlobal()), headStyles:{fillColor:[91,42,134]}, styles:{fontSize:9}});
  y = doc.lastAutoTable.finalY + 10;
  doc.setFontSize(11); doc.setTextColor(20); doc.text('Consumíveis mais utilizados', 15, y); y+=4;
  doc.autoTable({startY:y, head:[['Consumível','Qtd utilizada']], body:Object.entries(consumoPorMaterialGlobal()), headStyles:{fillColor:[236,30,121]}, styles:{fontSize:9}});
  y = doc.lastAutoTable.finalY + 10;
  doc.setFontSize(11); doc.setTextColor(20); doc.text('Folhas de Custo / Facturas Proforma', 15, y); y+=4;
  doc.autoTable({startY:y, head:[['Nº','Cliente','Data','Custo','Retenção','Total','Status']], body:DB.facturas.map(f=>[f.numero, clienteNome(f.cliente_id), fmtDate(f.data), fmtMoney(f.subtotal), fmtMoney(f.valorRetencao||0), fmtMoney(f.total), f.status]), headStyles:{fillColor:[23,169,176]}, styles:{fontSize:8}});
  doc.save('Relatorio_Yolandia_Decoracoes.pdf');
  toast('Relatório exportado em PDF.','ok');
}

function saveConfigEmpresa(){
  DB.config.empresa = {
    nome: document.getElementById('cfNome').value.trim() || 'Yolandia Decorações',
    telefone: document.getElementById('cfTelefone').value.trim(),
    email: document.getElementById('cfEmail').value.trim(),
    nif: document.getElementById('cfNif').value.trim(),
    endereco: document.getElementById('cfEndereco').value.trim()
  };
  saveDB(); toast('Dados da empresa atualizados.','ok');
}
function saveConfigGeral(){
  DB.config.retencaoFonte.ativo = document.getElementById('cfRetencaoAtiva').checked;
  DB.config.retencaoFonte.percentual = Number(document.getElementById('cfRetencaoPerc').value)||6.5;
  DB.config.moeda = document.getElementById('cfMoeda').value.trim()||'AOA';
  DB.config.tema = document.getElementById('cfTema').value;
  DB.config.iban = document.getElementById('cfIban').value.trim();
  DB.config.destinatario = document.getElementById('cfDestinatario').value.trim();
  saveDB(); applyTheme(); toast('Configurações atualizadas.','ok');
}
function exportBackup(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'backup_yolandia_'+todayISO()+'.json';
  link.click();
  toast('Backup exportado.','ok');
}
function importBackup(input){
  const f = input.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.clientes || !data.config){ toast('Ficheiro de backup inválido.','err'); return; }
      DB = data; migrateDB();
      toast('Backup restaurado com sucesso.','ok');
      navigate('dashboard');
    }catch(err){ toast('Erro ao ler o ficheiro de backup.','err'); }
  };
  reader.readAsText(f);
}
function renderUsersList(){
  document.getElementById('cfUsersList').innerHTML = DB.users.map(u=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span><b>${escapeHtml(u.nome)}</b> <span class="badge muted">${u.tipo}</span> ${u.ativo===false?'<span class="badge danger">Inativa</span>':'<span class="badge ok">Ativa</span>'}<br><span style="font-size:11px;color:var(--text-mut)">${escapeHtml(u.user)} ${u.email?'· '+escapeHtml(u.email):''}</span></span>
      <span style="display:flex;gap:6px"><button class="btn btn-sm" onclick="openUserForm('${u.id}')">✎</button><button class="btn btn-sm btn-danger" onclick="delUser('${u.id}')">🗑</button></span>
    </div>`).join('');
}
function openUserForm(id){
  const u = id? DB.users.find(x=>x.id===id) : {id:null, nome:'', user:'', email:'', tipo:'funcionario', ativo:true};
  openModal(id?'Editar Utilizador':'Novo Utilizador', `
    <div class="field"><label>Nome completo</label><input id="usNome" value="${escapeHtml(u.nome)}"></div>
    <div class="form-row">
      <div class="field"><label>Nome de utilizador</label><input id="usUser" value="${escapeHtml(u.user)}"></div>
      <div class="field"><label>Email (opcional, pode ser usado para login)</label><input id="usEmail" value="${escapeHtml(u.email||'')}"></div>
    </div>
    <div class="form-row">
      <div class="field"><label>${id?'Nova senha (deixe vazio para manter a atual)':'Senha'}</label><input id="usPass" type="password"></div>
      <div class="field"><label>Perfil</label><select id="usTipo">
        <option value="funcionario" ${u.tipo==='funcionario'?'selected':''}>Funcionário</option>
        <option value="admin" ${u.tipo==='admin'?'selected':''}>Administrador</option>
      </select></div>
    </div>
    <div class="field"><label><input type="checkbox" id="usAtivo" ${u.ativo!==false?'checked':''}> Conta ativa (permite login)</label></div>
  `, `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-brand" onclick="saveUser('${u.id||''}')">Guardar</button>`);
}
function saveUser(id){
  const nome = document.getElementById('usNome').value.trim();
  const user = document.getElementById('usUser').value.trim();
  const email = document.getElementById('usEmail').value.trim();
  const pass = document.getElementById('usPass').value;
  const tipo = document.getElementById('usTipo').value;
  const ativo = document.getElementById('usAtivo').checked;
  if(!nome || !user){ toast('Preencha o nome e o nome de utilizador.','err'); return; }
  if(!id && !pass){ toast('Defina uma senha para o novo utilizador.','err'); return; }
  const jaExiste = DB.users.find(x=>x.user.toLowerCase()===user.toLowerCase() && x.id!==id);
  if(jaExiste){ toast('Já existe um utilizador com este nome de utilizador.','err'); return; }
  if(id){
    const existing = DB.users.find(x=>x.id===id);
    existing.nome=nome; existing.user=user; existing.email=email; existing.tipo=tipo; existing.ativo=ativo;
    if(pass) existing.senhaHash = simpleHash(pass);
  } else {
    DB.users.push({id:uid('u'), nome, user, email, senhaHash: simpleHash(pass), tipo, ativo});
  }
  saveDB(); closeModal(); renderUsersList();
  toast('Utilizador guardado. Já pode iniciar sessão com estas credenciais.','ok');
}
function delUser(id){
  if(DB.users.length<=1){ toast('É necessário manter pelo menos um utilizador.','err'); return; }
  if(!confirm('Remover este utilizador?')) return;
  DB.users = DB.users.filter(x=>x.id!==id); saveDB(); renderUsersList();
}

  if(DB.currentUser && DB.users.find(u=>u.id===DB.currentUser)){
