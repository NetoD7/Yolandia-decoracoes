<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Yolandia Decorações</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.4.0/exceljs.min.js"></script>
<style>
:root{
  --roxo:#5B2A86;
  --roxo-dark:#3E1C5E;
  --turquesa:#17A9B0;
  --rosa:#EC1E79;
  --amarelo:#F7B500;
  --bg:#F6F4FA;
  --surface:#FFFFFF;
  --surface-2:#F0EBF7;
  --text:#241533;
  --text-mut:#6B6178;
  --border:#E4DEF0;
  --radius:14px;
  --shadow:0 4px 18px rgba(60,20,90,0.08);
  --ok:#1FA96A;
  --warn:#F7B500;
  --danger:#E3453A;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
}
[data-theme="dark"]{
  --bg:#1B1123;
  --surface:#251633;
  --surface-2:#2E1C40;
  --text:#F3EEFA;
  --text-mut:#B6A9C7;
  --border:#3B2751;
  --shadow:0 4px 18px rgba(0,0,0,0.35);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--bg); color:var(--text); transition:background .2s,color .2s;}
img{max-width:100%;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}

.hidden{display:none !important;}

/* ---------- LOGIN ---------- */
#loginScreen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,var(--roxo) 0%, var(--roxo-dark) 55%, #241040 100%);
  padding:20px;
}
.login-card{
  background:var(--surface); border-radius:20px; padding:40px 36px; width:100%; max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35); text-align:center;
}
.login-card img.logo{width:150px; margin-bottom:2px;}
.login-card h1{font-size:20px; color:var(--roxo); margin-bottom:2px;}
.login-card p.tag{color:var(--text-mut); font-size:12px; letter-spacing:.08em; text-transform:uppercase; margin-bottom:22px;}
.field{text-align:left; margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--text-mut); margin-bottom:5px;}
.field input, .field select, .field textarea{
  width:100%; padding:11px 13px; border-radius:10px; border:1.5px solid var(--border);
  background:var(--surface-2); color:var(--text); font-size:14px; outline:none;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--turquesa);}
.role-toggle{display:flex; gap:8px; margin-bottom:18px;}
.role-toggle button{
  flex:1; padding:10px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface-2);
  color:var(--text-mut); font-weight:600; font-size:13px;
}
.role-toggle button.active{background:var(--roxo); color:#fff; border-color:var(--roxo);}
.btn-primary{
  width:100%; padding:13px; border:none; border-radius:12px; font-weight:700; font-size:14px;
  background:linear-gradient(135deg,var(--rosa),var(--roxo)); color:#fff; letter-spacing:.02em;
  box-shadow:0 8px 20px rgba(91,42,134,0.35);
}
.btn-primary:active{transform:scale(.98);}
.login-hint{margin-top:16px; font-size:11px; color:var(--text-mut);}

/* ---------- APP SHELL ---------- */
#appShell{display:none; min-height:100vh;}
#appShell.active{display:flex;}
.sidebar{
  width:236px; background:var(--roxo-dark); color:#fff; display:flex; flex-direction:column;
  flex-shrink:0; height:100vh; position:sticky; top:0; overflow-y:auto;
}
.sidebar-brand{display:flex; align-items:center; gap:10px; padding:18px 16px; border-bottom:1px solid rgba(255,255,255,0.1);}
.sidebar-brand img{width:44px; height:44px; object-fit:contain;}
.sidebar-brand .name{font-weight:800; font-size:15px; line-height:1.1;}
.sidebar-brand .sub{font-size:9px; color:#D9C6EE; text-transform:uppercase; letter-spacing:.08em;}
.nav-list{list-style:none; padding:10px; flex:1;}
.nav-list li{margin-bottom:3px;}
.nav-list button{
  width:100%; text-align:left; background:none; border:none; color:#E4D6F3; padding:10px 12px;
  border-radius:10px; font-size:13.5px; font-weight:500; display:flex; align-items:center; gap:10px;
}
.nav-list button:hover{background:rgba(255,255,255,0.08);}
.nav-list button.active{background:linear-gradient(135deg,var(--rosa),var(--turquesa)); color:#fff; font-weight:700;}
.nav-list .ic{font-size:16px; width:18px; text-align:center;}
.sidebar-footer{padding:14px 16px; border-top:1px solid rgba(255,255,255,0.1); font-size:10.5px; color:#C7B4DD;}

.main{flex:1; display:flex; flex-direction:column; min-width:0;}
.topbar{
  background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20;
}
.topbar h2{font-size:19px; color:var(--roxo); display:flex; align-items:center; gap:8px;}
[data-theme="dark"] .topbar h2{color:#D9B8F0;}
.topbar-actions{display:flex; align-items:center; gap:10px;}
.icon-btn{
  width:36px; height:36px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface-2);
  display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--text);
}
.user-chip{display:flex; align-items:center; gap:8px; padding:6px 12px 6px 6px; border-radius:20px; background:var(--surface-2); font-size:12.5px; font-weight:600;}
.user-chip .av{width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--rosa),var(--amarelo)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:12px;}

.content{padding:22px 24px 60px; flex:1;}
.footer-brand{text-align:center; padding:16px; font-size:11px; color:var(--text-mut); border-top:1px solid var(--border);}

/* ---------- COMPONENTS ---------- */
.grid{display:grid; gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:700px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.card{background:var(--surface); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); border:1px solid var(--border);}
.stat-card{position:relative; overflow:hidden;}
.stat-card .stat-ic{width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:19px; margin-bottom:10px;}
.stat-card .stat-val{font-size:26px; font-weight:800;}
.stat-card .stat-lbl{font-size:12px; color:var(--text-mut); font-weight:600;}

.btn{padding:9px 16px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface-2); color:var(--text); font-weight:600; font-size:13px; display:inline-flex; align-items:center; gap:6px;}
.btn:hover{filter:brightness(0.97);}
.btn-brand{background:linear-gradient(135deg,var(--rosa),var(--roxo)); color:#fff; border:none; box-shadow:0 6px 16px rgba(91,42,134,0.3);}
.btn-turq{background:linear-gradient(135deg,var(--turquesa),#0E7B80); color:#fff; border:none;}
.btn-sm{padding:6px 10px; font-size:12px; border-radius:8px;}
.btn-danger{background:var(--danger); color:#fff; border:none;}
.btn-ghost{background:transparent; border:1.5px dashed var(--border);}

.toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
.toolbar .search{flex:1; min-width:180px;}
.search input{width:100%; padding:9px 14px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface-2); color:var(--text); font-size:13px;}
.tabs{display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;}
.tabs button{padding:8px 14px; border-radius:9px; border:1.5px solid var(--border); background:var(--surface-2); font-size:12.5px; font-weight:600; color:var(--text-mut);}
.tabs button.active{background:var(--roxo); color:#fff; border-color:var(--roxo);}

table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{text-align:left; padding:10px 12px; color:var(--text-mut); font-size:11px; text-transform:uppercase; letter-spacing:.04em; border-bottom:2px solid var(--border);}
tbody td{padding:11px 12px; border-bottom:1px solid var(--border);}
tbody tr:hover{background:var(--surface-2);}
.table-wrap{overflow-x:auto; background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow);}

.badge{display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700;}
.badge.ok{background:rgba(31,169,106,.14); color:var(--ok);}
.badge.warn{background:rgba(247,181,0,.16); color:#946400;}
.badge.danger{background:rgba(227,69,58,.14); color:var(--danger);}
.badge.info{background:rgba(23,169,176,.15); color:#0C7278;}
.badge.muted{background:var(--surface-2); color:var(--text-mut);}
.badge.purple{background:rgba(91,42,134,.13); color:var(--roxo);}
[data-theme="dark"] .badge.purple{color:#D9B8F0;}

.thumb{width:40px; height:40px; border-radius:9px; object-fit:cover; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:16px;}

.empty-state{text-align:center; padding:50px 20px; color:var(--text-mut);}
.empty-state .em-ic{font-size:38px; margin-bottom:10px;}
.empty-state .em-t{font-weight:700; color:var(--text); margin-bottom:4px;}

/* Modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(20,10,30,0.55); display:none; align-items:center; justify-content:center;
  z-index:100; padding:20px;
}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface); border-radius:18px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; box-shadow:0 30px 80px rgba(0,0,0,0.4);}
.modal.wide{max-width:860px;}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:2;}
.modal-head h3{font-size:16px;}
.modal-close{width:30px; height:30px; border-radius:8px; border:none; background:var(--surface-2); font-size:16px;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; position:sticky; bottom:0; background:var(--surface);}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
@media(max-width:560px){.form-row{grid-template-columns:1fr;}}

.toast-wrap{position:fixed; top:18px; right:18px; z-index:200; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--surface); border-left:4px solid var(--turquesa); box-shadow:var(--shadow); border-radius:10px; padding:12px 16px; font-size:13px; min-width:220px; animation:slideIn .25s ease;}
.toast.ok{border-color:var(--ok);}
.toast.err{border-color:var(--danger);}
@keyframes slideIn{from{transform:translateX(30px); opacity:0;} to{transform:translateX(0); opacity:1;}}

/* calendar */
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cal-dow{text-align:center; font-size:11px; font-weight:700; color:var(--text-mut); padding-bottom:4px;}
.cal-cell{min-height:86px; border-radius:10px; border:1px solid var(--border); padding:6px; background:var(--surface); font-size:11px; position:relative;}
.cal-cell.other{opacity:.35;}
.cal-cell.today{border:2px solid var(--turquesa);}
.cal-daynum{font-weight:700; font-size:12px; margin-bottom:4px;}
.cal-ev{border-radius:6px; padding:2px 6px; font-size:10px; margin-bottom:2px; color:#fff; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer;}
.legend{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px;}
.legend .lg-item{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--text-mut); font-weight:600;}
.legend .lg-dot{width:9px; height:9px; border-radius:50%;}

.checklist-item{display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border:1px solid var(--border); border-radius:10px; margin-bottom:8px; background:var(--surface-2);}
.chk-boxes{display:flex; gap:14px; flex-wrap:wrap;}
.chk-boxes label{display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--text-mut); font-weight:600;}

.progress-bar{height:6px; border-radius:6px; background:var(--surface-2); overflow:hidden; margin-top:6px;}
.progress-bar span{display:block; height:100%; border-radius:6px;}

@media print{
  .sidebar,.topbar,.no-print{display:none !important;}
  .content{padding:0;}
  body{background:#fff;}
}
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <img class="logo" id="loginLogo" src="" alt="Yolandia Decorações">
    <p class="tag">Criamos · Decoramos · Encantamos</p>
    <div class="role-toggle">
      <button type="button" class="active" data-role="admin" onclick="selectRole('admin')">Administrador</button>
      <button type="button" data-role="funcionario" onclick="selectRole('funcionario')">Funcionário</button>
    </div>
    <div class="field">
      <label>Utilizador ou Email</label>
      <input id="loginUser" placeholder="ex: admin ou admin@email.com">
    </div>
    <div class="field">
      <label>Senha</label>
      <input id="loginPass" type="password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <p class="login-hint">Utilizador padrão: <b>admin</b> / senha: <b>admin</b></p>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img id="sideLogo" src="" alt="logo">
      <div>
        <div class="name">Yolandia</div>
        <div class="sub">Decorações</div>
      </div>
    </div>
    <ul class="nav-list" id="navList"></ul>
    <div class="sidebar-footer">
      Yolandia Decorações © <span id="yrNow"></span><br>Sistema de Gestão v1.5
    </div>
  </aside>

  <div class="main">
    <div class="topbar no-print">
      <h2 id="pageTitle">Dashboard</h2>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="Alternar tema">🌗</button>
        <button class="icon-btn" onclick="doLogout()" title="Sair">⎋</button>
        <div class="user-chip"><span class="av" id="userAv">A</span><span id="userLbl">Admin</span></div>
      </div>
    </div>
    <div class="content" id="content"></div>
    <div class="footer-brand no-print">Yolandia Decorações — Sistema de Gestão Interno · Todos os direitos reservados</div>
  </div>
</div>

<!-- Generic Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <h3 id="modalTitle">Título</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

<script>

// ============ LOGO (vector recreation, used in-app and on all exported/printed documents) ============
const LOGO_B64 = "data:image/svg+xml;utf8," + encodeURIComponent(`
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 430" width="400" height="430">
  <circle cx="60" cy="90" r="5" fill="#5B2A86"/>
  <circle cx="55" cy="150" r="4" fill="#F7B500"/>
  <circle cx="345" cy="70" r="5" fill="#F7B500"/>
  <circle cx="360" cy="180" r="5" fill="#17A9B0"/>
  <circle cx="330" cy="230" r="4" fill="#F7B500"/>
  <path d="M75 55 c-3-6-12-3-12 4 0 8 12 15 12 15s12-7 12-15c0-7-9-10-12-4z" fill="#EC1E79"/>
  <path d="M130 30 c-2-4-8-2-8 3 0 5 8 10 8 10s8-5 8-10c0-5-6-7-8-3z" fill="#F7B500"/>
  <path d="M345 120 c-2-4-8-2-8 3 0 5 8 10 8 10s8-5 8-10c0-5-6-7-8-3z" fill="#F7B500"/>
  <path d="M300 170 c-2-4-8-2-8 3 0 5 8 10 8 10s8-5 8-10c0-5-6-7-8-3z" fill="#EC1E79"/>
  <g>
    <ellipse cx="150" cy="115" rx="55" ry="65" fill="#17A9B0"/>
    <path d="M130 70 q20-15 30 10" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M150 178 q-4 14 4 22" stroke="#5B2A86" stroke-width="3" fill="none"/>
  </g>
  <g>
    <ellipse cx="215" cy="90" rx="60" ry="72" fill="#EC1E79"/>
    <path d="M195 40 q22-16 32 12" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M215 160 q-4 16 4 24" stroke="#5B2A86" stroke-width="3" fill="none"/>
  </g>
  <g>
    <ellipse cx="270" cy="135" rx="48" ry="58" fill="#F7B500"/>
    <path d="M255 92 q16-12 24 8" stroke="#ffffff" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M270 191 q-4 12 4 18" stroke="#5B2A86" stroke-width="3" fill="none"/>
  </g>
  <path d="M154 200 q10 20 30 10 q18 -10 30 8" stroke="#5B2A86" stroke-width="3" fill="none"/>
  <text x="200" y="300" text-anchor="middle" font-family="'Brush Script MT','Segoe Script',cursive" font-size="72" fill="#5B2A86" font-style="italic">Yolandia</text>
  <text x="200" y="335" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" letter-spacing="4" fill="#17A9B0">DECORAÇÕES</text>
  <line x1="120" y1="355" x2="175" y2="355" stroke="#8b8b8b" stroke-width="2"/>
  <path d="M200 348 c-3-6-12-3-12 4 0 8 12 15 12 15s12-7 12-15c0-7-9-10-12-4z" fill="#EC1E79"/>
  <line x1="225" y1="355" x2="280" y2="355" stroke="#8b8b8b" stroke-width="2"/>
  <text x="200" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="15" font-weight="700" letter-spacing="2" fill="#5B2A86">CRIAMOS · DECORAMOS · ENCANTAMOS</text>
</svg>
`);

// Converts the vector logo (SVG) into a real rasterized PNG data URL at runtime,
// since jsPDF/ExcelJS image embedding requires actual PNG/JPEG bytes, not SVG.
let LOGO_PNG_CACHE = null;
function loadLogoPng(){
  return new Promise((resolve)=>{
    if(LOGO_PNG_CACHE){ resolve(LOGO_PNG_CACHE); return; }
    const img = new Image();
    img.onload = ()=>{
      try{
        const canvas = document.createElement('canvas');
        canvas.width = img.width || 400;
        canvas.height = img.height || 430;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
        LOGO_PNG_CACHE = canvas.toDataURL('image/png');
      }catch(e){ LOGO_PNG_CACHE = null; }
      resolve(LOGO_PNG_CACHE);
    };
    img.onerror = ()=> resolve(null);
    img.src = LOGO_B64;
  });
}

// ============ CONSTANTS ============
const STORAGE_KEY = 'yolandia_decoracoes_db_v2';
const COLORS = {roxo:'#5B2A86', turquesa:'#17A9B0', rosa:'#EC1E79', amarelo:'#F7B500'};
const EVENTO_STATUS = {
  'agendado': {label:'Agendado', color:'#17A9B0'},
  'preparacao': {label:'Em preparação', color:'#F7B500'},
  'execucao': {label:'Em execução', color:'#EC1E79'},
  'finalizado': {label:'Finalizado', color:'#1FA96A'},
  'cancelado': {label:'Cancelado', color:'#8b8b8b'}
};
const MENU = [
  {id:'dashboard', label:'Dashboard', ic:'📊'},
  {id:'agenda', label:'Agenda', ic:'📅'},
  {id:'estoque', label:'Estoque', ic:'📦'},
  {id:'listacompras', label:'Lista de Compras', ic:'🛒'},
  {id:'fornecedores', label:'Fornecedores', ic:'🚚'},
  {id:'eventos', label:'Eventos', ic:'🎉'},
  {id:'checklist', label:'Check List', ic:'✅'},
  {id:'clientes', label:'Clientes', ic:'👥'},
  {id:'facturas', label:'Folha de Custo', ic:'🧾'},
  {id:'financeiro', label:'Financeiro', ic:'💰'},
  {id:'danos', label:'Danos e Perdas', ic:'⚠️'},
  {id:'relatorios', label:'Relatórios', ic:'📈'},
  {id:'config', label:'Configurações', ic:'⚙️'},
];

// ============ STATE / STORAGE ============
let DB = null;
let currentView = 'dashboard';
let calCursor = new Date();
let calMode = 'mes';

function uid(prefix){ return (prefix||'id')+'_'+Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-4); }
function todayISO(){ return new Date().toISOString().slice(0,10); }
function fmtMoney(v){
  v = Number(v)||0;
  return v.toLocaleString('pt-PT',{minimumFractionDigits:2, maximumFractionDigits:2}) + ' ' + (DB.config.moeda||'AOA');
}

// Simulated password hashing (client-side demo — for a real backend use bcrypt/argon2 server-side)
function simpleHash(str){
  str = String(str||'');
  let hash = 5381;
  for(let i=0;i<str.length;i++){ hash = ((hash<<5)+hash) + str.charCodeAt(i); hash = hash & hash; }
  return 'h'+Math.abs(hash).toString(36)+str.length;
}

function migrateDB(){
  if(!DB.despesas) DB.despesas=[];
  if(!DB.adiantamentos) DB.adiantamentos=[];
  if(!DB.ocorrencias) DB.ocorrencias=[];
  if(!DB.listaCompras) DB.listaCompras=[];
  if(!DB.fornecedores) DB.fornecedores=[];
  if(!DB.consumoConsumiveis) DB.consumoConsumiveis=[];
  if(!DB.config) DB.config={};
  if(!DB.config.empresa) DB.config.empresa={nome:'Yolandia Decorações', telefone:'', email:'', nif:'', endereco:''};
  if(!DB.config.retencaoFonte) DB.config.retencaoFonte = {ativo:true, percentual:6.5};
  if(DB.config.iva !== undefined) delete DB.config.iva;
  if(!DB.config.moeda) DB.config.moeda='AOA';
  if(!DB.config.tema) DB.config.tema='light';
  if(!DB.config.proximoNumFactura) DB.config.proximoNumFactura=1;
  if(!DB.config.proximoNumListaCompras) DB.config.proximoNumListaCompras=1;
  if(!DB.config.iban) DB.config.iban = 'AO06 0040 0000 8903 9518 1024 0';
  if(!DB.config.destinatario) DB.config.destinatario = 'YOLANDIA COMERCIO PRESTACAO SERVICO LDA';

  ['materiaisFixos','consumiveis','alugaveis'].forEach(key=>{
    (DB[key]||[]).forEach(m=>{
      if(!m.historico) m.historico=[];
      if(!m.tipoAquisicao) m.tipoAquisicao='compra';
      if(m.foto===undefined) m.foto='';
      if(m.fornecedor_id===undefined){
        const legacyNome = (m.fornecedor && m.fornecedor.nome) || '';
        m.fornecedor_id = legacyNome? findOrCreateFornecedorByName(legacyNome) : '';
      }
    });
  });
  (DB.users||[]).forEach(u=>{
    if(u.senha && !u.senhaHash){ u.senhaHash = simpleHash(u.senha); delete u.senha; }
    if(!u.senhaHash) u.senhaHash = simpleHash('1234');
    if(u.ativo===undefined) u.ativo=true;
    if(u.email===undefined) u.email='';
  });
  (DB.facturas||[]).forEach(f=>{
    if(f.iva!==undefined) delete f.iva;
    if(f.retencaoAtiva===undefined) f.retencaoAtiva=false;
    if(f.percentualRetencao===undefined) f.percentualRetencao = DB.config.retencaoFonte.percentual;
    if(f.valorRetencao===undefined) f.valorRetencao = 0;
    if(f.subtotal===undefined) f.subtotal = (f.itens||[]).reduce((s,i)=>s+i.qtd*i.precoUnit,0);
    if(f.multiplicador===undefined) f.multiplicador = 2;
    if(f.valorFacturaProforma===undefined) f.valorFacturaProforma = (f.total!==undefined? f.total : f.subtotal);
    if(f.evento_id===undefined) f.evento_id='';
    if(!f.status) f.status='emitida';
    (f.itens||[]).forEach(i=>{ if(i.categoria===undefined) i.categoria='Material Fixo'; if(i.unidade===undefined) i.unidade='unid'; });
  });
  (DB.alugueres||[]).forEach(a=>{
    if(a.fornecedor_id===undefined){ a.fornecedor_id = a.cliente_id || ''; }
  });
  (DB.listaCompras||[]).forEach(l=>{
    if(l.categoria===undefined) l.categoria='Material Fixo';
    if(l.unidade===undefined) l.unidade='unid';
    if(l.valorUnitario===undefined) l.valorUnitario=0;
    if(l.fornecedor_id===undefined) l.fornecedor_id='';
    if(l.tipoAquisicao===undefined) l.tipoAquisicao='compra';
    if(l.responsavel===undefined) l.responsavel='';
    if(l.obs===undefined) l.obs='';
    if(l.item_id===undefined) l.item_id=null;
    if(l.tipoItem===undefined) l.tipoItem=null;
    if(!['pendente','comprado','alugado','recebido','cancelado'].includes(l.status)) l.status='pendente';
  });
  (DB.eventos||[]).forEach(ev=>{
    (ev.materiais||[]).forEach(m=>{
      if(m.qtdDisponivel===undefined) m.qtdDisponivel=0;
      if(m.qtdUtilizada===undefined) m.qtdUtilizada=0;
      if(m.consumoConfirmado===undefined) m.consumoConfirmado=false;
      if(m.obs===undefined) m.obs='';
      if(m.unidade===undefined) m.unidade='';
    });
  });
  // Garante que todos os consumíveis já cadastrados têm a sua linha fixa na Lista de Compras
  (DB.consumiveis||[]).forEach(m=>syncConsumivelToListaCompras(m.id));
  saveDB();
}

}

}

function doLogin(){
  const identifier = document.getElementById('loginUser').value.trim();
  const pass = document.getElementById('loginPass').value;
  if(!identifier || !pass){ toast('Preencha o utilizador e a senha.', 'err'); return; }
  const found = DB.users.find(u =>
    (u.user && u.user.toLowerCase()===identifier.toLowerCase()) ||
    (u.email && u.email.toLowerCase()===identifier.toLowerCase())
  );
  if(!found || found.tipo!==selectedRole){ toast('Utilizador não encontrado.', 'err'); return; }
  if(found.ativo===false){ toast('Conta inativa. Contacte o administrador.', 'err'); return; }
  if(found.senhaHash !== simpleHash(pass)){ toast('Senha incorreta.', 'err'); return; }
  DB.currentUser = found.id;
  saveDB();
  enterApp();
}

function fileToBase64(input, cb){
  const f = input.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = e=>cb(e.target.result);
  reader.readAsDataURL(f);
}
function detectImgFormat(dataUrl){
  if(!dataUrl) return null;
  const match = dataUrl.match(/^data:image\/(\w+);base64,/);
  if(!match) return null;
  const ext = match[1].toLowerCase();
  if(ext==='jpeg'||ext==='jpg') return 'JPEG';
  if(ext==='png') return 'PNG';
  if(ext==='webp') return 'WEBP';
  return 'PNG';
}

function computeStock(){
  const totalMat = DB.materiaisFixos.reduce((s,m)=>s+Number(m.quantidade||0),0) + DB.alugaveis.reduce((s,m)=>s+Number(m.quantidade||0),0);
  const alugados = DB.alugueres.filter(a=>a.status==='ativo').reduce((s,a)=>s+a.itens.reduce((x,i)=>x+Number(i.qtd||0),0),0);
  const disponiveis = Math.max(totalMat - alugados,0);
  return {totalMat, alugados, disponiveis};
}

    const monthly = new Array(12).fill(0);

// ============ AGENDA / CALENDÁRIO ============
function renderAgenda(){
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="toolbar">
      <div class="tabs">
        <button class="${calMode==='mes'?'active':''}" onclick="setCalMode('mes')">Mês</button>
        <button class="${calMode==='semana'?'active':''}" onclick="setCalMode('semana')">Semana</button>
        <button class="${calMode==='dia'?'active':''}" onclick="setCalMode('dia')">Dia</button>
      </div>
      <div class="search"><input id="agSearch" placeholder="Pesquisar por cliente ou local..." oninput="renderAgendaBody()"></div>
      <button class="btn btn-brand" onclick="openEventoForm()">+ Novo Evento</button>
    </div>
    <div class="legend">
      ${Object.entries(EVENTO_STATUS).map(([k,v])=>`<div class="lg-item"><span class="lg-dot" style="background:${v.color}"></span>${v.label}</div>`).join('')}
    </div>
    <div class="card" style="margin-bottom:16px">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
        <button class="btn btn-sm" onclick="calShift(-1)">‹ Anterior</button>
        <h3 id="calLabel"></h3>
        <button class="btn btn-sm" onclick="calShift(1)">Seguinte ›</button>
      </div>
      <div id="calBody"></div>
    </div>
    <div id="agendaAlerts"></div>
  `;
  renderAgendaBody();
}
function setCalMode(m){ calMode=m; renderAgendaBody(); }
function calShift(dir){
  if(calMode==='mes') calCursor.setMonth(calCursor.getMonth()+dir);
  else if(calMode==='semana') calCursor.setDate(calCursor.getDate()+7*dir);
  else calCursor.setDate(calCursor.getDate()+dir);
  renderAgendaBody();
}
function eventosFiltrados(){
  const q = (document.getElementById('agSearch')?.value||'').toLowerCase();
  if(!q) return DB.eventos;
  return DB.eventos.filter(e=> (clienteNome(e.cliente_id)+' '+e.local).toLowerCase().includes(q));
}
function renderAgendaBody(){
  const evs = eventosFiltrados();
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dows = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const body = document.getElementById('calBody');
  const label = document.getElementById('calLabel');

  if(calMode==='mes'){
    label.textContent = months[calCursor.getMonth()]+' '+calCursor.getFullYear();
    const first = new Date(calCursor.getFullYear(), calCursor.getMonth(), 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(calCursor.getFullYear(), calCursor.getMonth()+1, 0).getDate();
    const prevDays = new Date(calCursor.getFullYear(), calCursor.getMonth(), 0).getDate();
    let cells = [];
    for(let i=startDow-1;i>=0;i--) cells.push({d:prevDays-i, other:true});
    for(let i=1;i<=daysInMonth;i++) cells.push({d:i, other:false});
    while(cells.length%7!==0) cells.push({d:cells.length,other:true});
    const todayStr = todayISO();
    let html = '<div class="cal-grid">' + dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
    cells.forEach(cell=>{
      const dateStr = cell.other? '' : `${calCursor.getFullYear()}-${String(calCursor.getMonth()+1).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
      const dayEvs = cell.other? [] : evs.filter(e=>e.data===dateStr);
      html += `<div class="cal-cell ${cell.other?'other':''} ${dateStr===todayStr?'today':''}">
        <div class="cal-daynum">${cell.d}</div>
        ${dayEvs.slice(0,3).map(e=>`<div class="cal-ev" style="background:${EVENTO_STATUS[e.estado].color}" onclick="openEventoDetalhe('${e.id}')" title="${escapeHtml(e.nome_evento)}">${escapeHtml(e.nome_evento)}</div>`).join('')}
        ${dayEvs.length>3? `<div style="font-size:9px;color:var(--text-mut)">+${dayEvs.length-3} mais</div>`:''}
      </div>`;
    });
    html += '</div>';
    body.innerHTML = html;
  } else if(calMode==='semana'){
    const start = new Date(calCursor); start.setDate(start.getDate()-start.getDay());
    label.textContent = 'Semana de ' + start.toLocaleDateString('pt-PT');
    let html = '<div style="display:flex;flex-direction:column;gap:8px">';
    for(let i=0;i<7;i++){
      const d = new Date(start); d.setDate(start.getDate()+i);
      const dateStr = d.toISOString().slice(0,10);
      const dayEvs = evs.filter(e=>e.data===dateStr);
      html += `<div style="display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:8px">
        <div style="width:90px;font-weight:700;font-size:12.5px">${dows[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}</div>
        <div style="flex:1;display:flex;flex-wrap:wrap;gap:6px">
        ${dayEvs.length? dayEvs.map(e=>`<div class="cal-ev" style="background:${EVENTO_STATUS[e.estado].color};position:static" onclick="openEventoDetalhe('${e.id}')">${escapeHtml(e.nome_evento)} · ${e.hora||''}</div>`).join('') : '<span style="font-size:12px;color:var(--text-mut)">Sem eventos</span>'}
        </div>
      </div>`;
    }
    html += '</div>';
    body.innerHTML = html;
  } else {
    const dateStr = calCursor.toISOString().slice(0,10);
    label.textContent = calCursor.toLocaleDateString('pt-PT', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    const dayEvs = evs.filter(e=>e.data===dateStr);
    body.innerHTML = dayEvs.length ? dayEvs.map(e=>`
      <div class="checklist-item" onclick="openEventoDetalhe('${e.id}')" style="cursor:pointer">
        <div>
          <div style="font-weight:700">${escapeHtml(e.nome_evento)} <span class="badge" style="background:${EVENTO_STATUS[e.estado].color}22;color:${EVENTO_STATUS[e.estado].color}">${EVENTO_STATUS[e.estado].label}</span></div>
          <div style="font-size:12px;color:var(--text-mut)">${escapeHtml(e.local)} · ${e.hora||'—'} · ${clienteNome(e.cliente_id)}</div>
        </div>
      </div>`).join('') : emptyMini('Sem eventos neste dia');
  }

  const hoje = todayISO();
  const amanha = new Date(); amanha.setDate(amanha.getDate()+1);
  const amanhaStr = amanha.toISOString().slice(0,10);
  let alerts = [];
  DB.eventos.forEach(e=>{
    if(e.data===amanhaStr && e.estado!=='cancelado') alerts.push(`🔔 Evento amanhã: <b>${escapeHtml(e.nome_evento)}</b> — ${escapeHtml(e.local)}`);
  });
  DB.alugueres.forEach(a=>{
    if(a.dataEntrega===hoje) alerts.push(`🚚 Entrega hoje — fornecedor <b>${escapeHtml(fornecedorNome(a.fornecedor_id))}</b>`);
    if(a.dataRecolha===hoje) alerts.push(`🔄 Recolha hoje — fornecedor <b>${escapeHtml(fornecedorNome(a.fornecedor_id))}</b>`);
  });
  const alertBox = document.getElementById('agendaAlerts');
  alertBox.innerHTML = alerts.length? `<div class="card"><h3 style="margin-bottom:10px">🔔 Lembretes</h3>${alerts.map(a=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">${a}</div>`).join('')}</div>` : '';
}

function saveMaterialFixo(id){
  const nome = document.getElementById('mfNome').value.trim();
  if(!nome){ toast('Indique o nome do material','err'); return; }
  const novoValor = Number(document.getElementById('mfValor').value)||0;
  const novaQtd = Number(document.getElementById('mfQtd').value)||0;
  const usuarioAtual = currentUserName();
  const data = {
    codigo: document.getElementById('mfCodigo').value.trim(),
    nome, categoria: document.getElementById('mfCategoria').value.trim(),
    foto: document.getElementById('mfFotoPrev').dataset.val||'',
    estado: document.getElementById('mfEstado').value,
    quantidade: novaQtd,
    valor: novoValor,
    dataCompra: document.getElementById('mfData').value,
    obs: document.getElementById('mfObs').value.trim(),
    tipoAquisicao: document.getElementById('mfTipoAquisicao').value,
    fornecedor_id: resolveFornecedorFromForm('mf')
  };
  if(id){
    const existing = DB.materiaisFixos.find(x=>x.id===id);
    const hist = existing.historico || [];
    if(existing.valor !== novoValor) hist.push({data:todayISO(), campo:'Preço', antes:existing.valor, depois:novoValor, usuario:usuarioAtual});
    if(existing.quantidade !== novaQtd) hist.push({data:todayISO(), campo:'Quantidade', antes:existing.quantidade, depois:novaQtd, usuario:usuarioAtual});
    Object.assign(existing, data); existing.historico = hist;
  }
  else{ data.id = uid('mf'); data.historico=[{data:todayISO(), campo:'Registo criado', antes:'-', depois:`Qtd ${novaQtd} · ${fmtMoney(novoValor)}`, usuario:usuarioAtual}]; DB.materiaisFixos.push(data); }
  saveDB(); closeModal(); renderEstoqueBody(); toast('Material guardado com sucesso.','ok');
}
function delMaterialFixo(id){
  if(!confirm('Remover este material?')) return;
  DB.materiaisFixos = DB.materiaisFixos.filter(x=>x.id!==id); saveDB(); renderEstoqueBody();
}

function saveConsumivel(id){
  const nome = document.getElementById('csNome').value.trim();
  if(!nome){ toast('Indique o nome','err'); return; }
  const novoPreco = Number(document.getElementById('csPreco').value)||0;
  const novaQtd = Number(document.getElementById('csQtd').value)||0;
  const usuarioAtual = currentUserName();
  const data = {
    nome, tipo: document.getElementById('csTipo').value, cor: document.getElementById('csCor').value.trim(),
    tamanho: document.getElementById('csTamanho').value.trim(), quantidade: novaQtd,
    unidade: document.getElementById('csUnidade').value.trim()||'unid', precoCompra: novoPreco,
    estoqueMinimo: Number(document.getElementById('csMin').value)||0,
    tipoAquisicao: document.getElementById('csTipoAquisicao').value,
    fornecedor_id: resolveFornecedorFromForm('cs'),
    foto: document.getElementById('csFotoPrev').dataset.val||''
  };
  let finalId = id;
  if(id){
    const existing = DB.consumiveis.find(x=>x.id===id);
    const hist = existing.historico || [];
    if(existing.precoCompra !== novoPreco) hist.push({data:todayISO(), campo:'Preço de compra', antes:existing.precoCompra, depois:novoPreco, usuario:usuarioAtual});
    if(existing.quantidade !== novaQtd) hist.push({data:todayISO(), campo:'Quantidade', antes:existing.quantidade, depois:novaQtd, usuario:usuarioAtual});
    Object.assign(existing, data); existing.historico = hist;
  }
  else{ data.id = uid('cs'); data.historico=[{data:todayISO(), campo:'Registo criado', antes:'-', depois:`Qtd ${novaQtd}`, usuario:usuarioAtual}]; DB.consumiveis.push(data); finalId = data.id; }
  // Cria ou mantém a linha fixa deste consumível na Lista de Compras (nome/fornecedor sincronizados; qtd/valor ficam a cargo do utilizador na própria lista)
  syncConsumivelToListaCompras(finalId);
  saveDB(); closeModal(); renderEstoqueBody(); toast('Consumível guardado. Item fixo da Lista de Compras sincronizado.','ok');
}
function delConsumivel(id){
  if(!confirm('Remover este consumível? A sua linha fixa na Lista de Compras também será removida.')) return;
  DB.consumiveis = DB.consumiveis.filter(x=>x.id!==id);
  DB.listaCompras = DB.listaCompras.filter(l=>!(l.tipoItem==='consumivel' && l.item_id===id));
  saveDB(); renderEstoqueBody();
}
function addToListaComprasFromEstoque(id){
  const m = DB.consumiveis.find(x=>x.id===id);
  if(!m) return;
  syncConsumivelToListaCompras(id);
  const item = DB.listaCompras.find(l=>l.tipoItem==='consumivel' && l.item_id===id);
  const faltam = Math.max(Number(m.estoqueMinimo||0)*2 - Number(m.quantidade||0), 1);
  item.quantidade = faltam;
  if(!item.valorUnitario) item.valorUnitario = m.precoCompra||0;
  item.status = 'pendente';
  item.dataNecessidade = todayISO();
  saveDB();
  toast('Item fixo da Lista de Compras atualizado com a quantidade necessária.','ok');
  renderEstoqueBody();
}
function viewHistoricoMaterial(id, tipo){
  const srcMap = {fixo:DB.materiaisFixos, consumivel:DB.consumiveis, alugavel:DB.alugaveis};
  const src = srcMap[tipo];

  openModal('Histórico — '+m.nome, `

        <span style="color:var(--text-mut)">Por: ${escapeHtml(h.usuario||'-')}</span>

}

  doc.text(titulo, 40, 18);

// ============ LISTA DE COMPRAS / ALUGUER (módulo completo de aquisições) ============
// Os CONSUMÍVEIS têm sempre uma única linha FIXA nesta lista, criada/atualizada
// automaticamente a partir do cadastro em Estoque → Consumíveis. Essa linha nunca
// é apagada e não pode ser reeditada por completo — apenas Quantidade e Valor
// Unitário podem ser ajustados diretamente na tabela, evitando reregistos a cada evento.
function syncConsumivelToListaCompras(consumivelId){
  const m = DB.consumiveis.find(x=>x.id===consumivelId);
  if(!m) return;
  let item = DB.listaCompras.find(l=>l.tipoItem==='consumivel' && l.item_id===consumivelId);
  if(!item){
    DB.listaCompras.push({
      id:uid('lc'), materialNome:m.nome, categoria:'Consumível', quantidade:0, unidade:m.unidade||'unid',
      valorUnitario:m.precoCompra||0, fornecedor_id:m.fornecedor_id||'', tipoAquisicao:m.tipoAquisicao||'compra',
      item_id:consumivelId, tipoItem:'consumivel', evento_id:'', dataNecessidade:todayISO(), status:'pendente',
      responsavel:currentUserName(), obs:'', criadoEm:new Date().toISOString()
    });
  } else {
    // Mantém a quantidade e o valor definidos pelo utilizador; apenas o nome é sincronizado
    item.materialNome = m.nome;
    if(item.unidade===undefined || item.unidade==='') item.unidade = m.unidade||'unid';
  }
}
function syncAllConsumiveisToListaCompras(){
  DB.consumiveis.forEach(m=>syncConsumivelToListaCompras(m.id));
  saveDB();
}

  const pendentes = DB.listaCompras.filter(l=>l.status==='pendente').length;
  const resolvidos = DB.listaCompras.filter(l=>['comprado','alugado','recebido'].includes(l.status)).length;
  const totalGeralTudo = DB.listaCompras.reduce((s,l)=>s+Number(l.quantidade||0)*Number(l.valorUnitario||0),0);
  document.getElementById('lcStats').innerHTML = `
    ${statCard('🛒', COLORS.amarelo, pendentes, 'Itens pendentes')}
    ${statCard('✅', '#1FA96A', resolvidos, 'Itens resolvidos')}

      <td><b>${escapeHtml(l.materialNome)}</b>${ev?`<br><span style="font-size:10.5px;color:var(--text-mut)">Evento: ${escapeHtml(ev.nome_evento)}</span>`:''}</td>
      <td><span class="badge purple">${escapeHtml(l.categoria)}</span>${isFixo?` <span class="badge info" title="Item fixo gerado automaticamente a partir do consumível cadastrado em Estoque">🔒 Fixo</span>`:''}</td>
      <td><input type="number" value="${l.quantidade}" style="width:60px" onchange="updateListaCompraCampo('${l.id}','quantidade',this.value)"></td>
      <td>${escapeHtml(l.unidade)}</td>
      <td><input type="number" value="${l.valorUnitario}" style="width:80px" onchange="updateListaCompraCampo('${l.id}','valorUnitario',this.value)"></td>
      <td style="font-weight:700">${fmtMoney(subtotal)}</td>
      <td style="font-size:12px">${escapeHtml(fornecedorNome(l.fornecedor_id))}</td>
      <td>${l.tipoAquisicao==='aluguer'?'Aluguer':'Compra'}</td>
      <td>${listaCompraEstadoBadge(l.status)}</td>
      <td style="white-space:nowrap">
        ${l.status==='pendente'? `<button class="btn btn-sm btn-turq" onclick="resolverListaCompraRapido('${l.id}')" title="Marcar como resolvido">✓</button>`:''}
        ${isFixo? `<span style="font-size:10.5px;color:var(--text-mut)">Edite Qtd/Valor</span>` : `<button class="btn btn-sm" onclick="openListaComprasForm('${l.id}')">✎</button> <button class="btn btn-sm btn-danger" onclick="delListaCompra('${l.id}')">🗑</button>`}
      </td>
    </tr>`;
  }).join('') : `<tr><td colspan="10"><div class="empty-state"><div class="em-ic">🛒</div><div class="em-t">Nenhum item na lista de compras</div></div></td></tr>`;
  const totalFiltrado = rows.reduce((s,l)=>s+Number(l.quantidade||0)*Number(l.valorUnitario||0),0);
  document.getElementById('lcTotalBox').innerHTML = `<b>Total Geral (itens listados): ${fmtMoney(totalFiltrado)}</b>`;
}
function listaCompraEstadoBadge(s){
  const map = {pendente:['warn','Pendente'], comprado:['ok','Comprado'], alugado:['info','Alugado'], recebido:['ok','Recebido'], cancelado:['muted','Cancelado']};
  const [cls,lbl] = map[s]||['muted',s];
  return `<span class="badge ${cls}">${lbl}</span>`;
}
function listaCompraEstadoTexto(s){
  const map={pendente:'Pendente',comprado:'Comprado',alugado:'Alugado',recebido:'Recebido',cancelado:'Cancelado'};
  return map[s]||s;
}
function updateListaCompraCampo(id, campo, val){
  const item = DB.listaCompras.find(x=>x.id===id);
  item[campo] = Number(val)||0;
  saveDB(); renderListaComprasBody();
}
function resolverListaCompraNoEstoque(item){
  if(!item.item_id || !item.tipoItem) return;
  const map = {fixo:DB.materiaisFixos, consumivel:DB.consumiveis, alugavel:DB.alugaveis};
  const src = map[item.tipoItem];
  if(!src) return;
  const m = src.find(x=>x.id===item.item_id);
  if(m){
    const antes = m.quantidade;
    m.quantidade = Number(m.quantidade||0) + Number(item.quantidade||0);
    if(!m.historico) m.historico=[];
    m.historico.push({data:todayISO(), campo:'Quantidade (reposição via Lista de Compras)', antes, depois:m.quantidade, usuario:currentUserName()});
  }
}
function resolverListaCompraRapido(id){
  const item = DB.listaCompras.find(x=>x.id===id);
  if(!item) return;
  item.status = item.tipoAquisicao==='aluguer' ? 'alugado' : 'comprado';
  resolverListaCompraNoEstoque(item);
  saveDB(); renderListaComprasBody(); toast('Item marcado como resolvido e estoque atualizado.','ok');
}
function addToListaCompras(nome, qtd, eventoId, tipoItem, itemId, categoria, unidade){
  // Para consumíveis, nunca cria uma linha nova — atualiza a linha fixa já existente
  if(tipoItem==='consumivel' && itemId){
    syncConsumivelToListaCompras(itemId);
    const item = DB.listaCompras.find(l=>l.tipoItem==='consumivel' && l.item_id===itemId);
    if(item){
      item.quantidade = Number(item.quantidade||0) + Number(qtd||0);
      if(eventoId){ item.evento_id = eventoId; const ev = DB.eventos.find(e=>e.id===eventoId); if(ev) item.dataNecessidade = ev.data; }
      item.status = 'pendente';
      saveDB();
      return;
    }
  }
  const ev = eventoId? DB.eventos.find(e=>e.id===eventoId) : null;
  DB.listaCompras.push({
    id:uid('lc'), materialNome:nome, categoria: categoria||'Material Fixo', quantidade:qtd, unidade: unidade||'unid',
    valorUnitario:0, fornecedor_id:'', tipoAquisicao: tipoItem==='alugavel'?'aluguer':'compra',
    item_id:itemId||null, tipoItem: tipoItem||null,
    evento_id:eventoId||'', dataNecessidade: ev? ev.data : todayISO(), status:'pendente', responsavel: currentUserName(), obs:'', criadoEm:new Date().toISOString()
  });
  saveDB();
}

  `, `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-brand" onclick="saveListaComprasForm('${l.id||''}')">Guardar</button>`, true);
}
function saveListaComprasForm(id){
  const nome = document.getElementById('lcMaterial').value.trim();
  if(!nome){ toast('Indique o nome do material','err'); return; }
  const fornecedorId = resolveFornecedorFromForm('lc');
  const data = {
    materialNome: nome, categoria: document.getElementById('lcCategoria').value,
    quantidade: Number(document.getElementById('lcQtd').value)||1, unidade: document.getElementById('lcUnidade').value.trim()||'unid',
    valorUnitario: Number(document.getElementById('lcValorUnit').value)||0, tipoAquisicao: document.getElementById('lcTipoAquisicao').value,
    fornecedor_id: fornecedorId, dataNecessidade: document.getElementById('lcData').value, status: document.getElementById('lcStatus').value,
    evento_id: document.getElementById('lcEvento').value, responsavel: document.getElementById('lcResponsavel').value.trim(),
    obs: document.getElementById('lcObs').value.trim()
  };
  if(id){
    const existing = DB.listaCompras.find(x=>x.id===id);
    const wasResolved = ['comprado','alugado','recebido'].includes(existing.status);
    Object.assign(existing, data);
    const isResolvedNow = ['comprado','alugado','recebido'].includes(existing.status);
    if(isResolvedNow && !wasResolved){ resolverListaCompraNoEstoque(existing); toast('Estoque atualizado automaticamente.','ok'); }
  } else {
    data.id = uid('lc'); data.item_id=null; data.tipoItem=null; data.criadoEm=new Date().toISOString();
    DB.listaCompras.push(data);

function delListaCompra(id){

async function exportListaComprasPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const numeroLista = DB.config.proximoNumListaCompras || 1;
  const logoPng = await loadLogoPng();
  if(logoPng){ try{ doc.addImage(logoPng, 'PNG', 15, 10, 20, 20); }catch(e){} }
  doc.setFontSize(15); doc.setTextColor(91,42,134);
  doc.text('Lista de Compras / Aluguer', 40, 18);
  doc.setFontSize(9); doc.setTextColor(100);
  doc.text(DB.config.empresa.nome, 40, 24);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text(`Data: ${new Date().toLocaleDateString('pt-PT')}   |   Nº da Lista: ${String(numeroLista).padStart(4,'0')}   |   Responsável: ${currentUserName()}`, 15, 36);
  const body = DB.listaCompras.map(l=>{
    const subtotal = Number(l.quantidade||0)*Number(l.valorUnitario||0);
    return [l.materialNome, l.categoria, l.quantidade, l.unidade, fmtMoney(l.valorUnitario), fmtMoney(subtotal), fornecedorNome(l.fornecedor_id), l.tipoAquisicao==='aluguer'?'Aluguer':'Compra', listaCompraEstadoTexto(l.status)];
  });
  doc.autoTable({startY:42, head:[['Produto','Categoria','Qtd','Unid.','Valor Unit.','Subtotal','Fornecedor','Tipo','Estado']], body, headStyles:{fillColor:[91,42,134]}, styles:{fontSize:7.5}});
  let y = doc.lastAutoTable.finalY + 10;
  const totalGeral = DB.listaCompras.reduce((s,l)=>s+Number(l.quantidade||0)*Number(l.valorUnitario||0),0);
  doc.setFontSize(12); doc.setTextColor(91,42,134);
  doc.text(`Total Geral: ${fmtMoney(totalGeral)}`, 15, y); y+=12;
  doc.setFontSize(9); doc.setTextColor(80);
  doc.text('Observações: ________________________________________________', 15, y); y+=20;
  doc.text('Assinatura do responsável: ______________________________', 15, y);
  doc.setTextColor(150);
  doc.text('Yolandia Decorações — Criamos · Decoramos · Encantamos', 15, 285);
  DB.config.proximoNumListaCompras = numeroLista + 1;
  saveDB();
  doc.save('Lista_Compras_Yolandia_'+String(numeroLista).padStart(4,'0')+'.pdf');
  toast('Lista de compras exportada em PDF.','ok');
}

function qtdReservadaHoje(materialId){
  let total = 0;
  DB.alugueres.forEach(a=>{
    if(a.status==='cancelado' || a.status==='concluido') return;
    a.itens.forEach(i=>{ if(i.item_id===materialId) total += Number(i.qtd||0); });
  });
  return total;
}

function saveAlugavel(id, returnFornecedorId){
  const nome = document.getElementById('avNome').value.trim();
  if(!nome){ toast('Indique o nome','err'); return; }
  const novaQtd = Number(document.getElementById('avQtd').value)||0;
  const novoPrecoDia = Number(document.getElementById('avPrecoDia').value)||0;
  const usuarioAtual = currentUserName();
  const data = {
    codigo: document.getElementById('avCodigo').value.trim(), nome,
    modelo: document.getElementById('avModelo').value.trim(), cor: document.getElementById('avCor').value.trim(),
    quantidade: novaQtd,
    precoUnidade: Number(document.getElementById('avPrecoUnid').value)||0,
    precoDia: novoPrecoDia, estado:'disponivel',
    foto: document.getElementById('avFotoPrev').dataset.val||'',
    tipoAquisicao: document.getElementById('avTipoAquisicao').value,
    fornecedor_id: resolveFornecedorFromForm('av')
  };
  if(id){
    const existing = DB.alugaveis.find(x=>x.id===id);
    const hist = existing.historico || [];
    if(existing.precoDia !== novoPrecoDia) hist.push({data:todayISO(), campo:'Preço/dia', antes:existing.precoDia, depois:novoPrecoDia, usuario:usuarioAtual});
    if(existing.quantidade !== novaQtd) hist.push({data:todayISO(), campo:'Quantidade', antes:existing.quantidade, depois:novaQtd, usuario:usuarioAtual});
    Object.assign(existing, data); existing.historico = hist;
  }
  else{ data.id = uid('al'); data.historico=[{data:todayISO(), campo:'Registo criado', antes:'-', depois:`Qtd ${novaQtd}`, usuario:usuarioAtual}]; DB.alugaveis.push(data); }
  saveDB(); closeModal();
  if(returnFornecedorId){ viewFornecedorMateriais(returnFornecedorId); if(currentView==='fornecedores') renderFornecedoresBody(); }
  else if(currentView==='aluguer'){ renderAluguerBody(); }
  toast('Material alugável guardado.','ok');
}
function delAlugavel(id){
  if(!confirm('Remover este material?')) return;
  DB.alugaveis = DB.alugaveis.filter(x=>x.id!==id); saveDB();
  if(currentView==='aluguer') renderAluguerBody();
}

  `, `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-brand" onclick="saveAluguer()">Confirmar Reserva</button>`, true);

}
function refreshAluguerMateriaisOptions(){
  const sel = document.getElementById('rsItemMaterial');
  if(!sel) return;
  const fid = document.getElementById('rsFornecedor').value;
  const list = fid? DB.alugaveis.filter(m=>m.fornecedor_id===fid) : DB.alugaveis;
  sel.innerHTML = list.length? list.map(m=>`<option value="${m.id}">${escapeHtml(m.nome)} (${escapeHtml(m.cor)})</option>`).join('') : '<option value="">Sem materiais disponíveis</option>';
}
function addItemAluguer(){
  const matId = document.getElementById('rsItemMaterial').value;
  const qtd = Number(document.getElementById('rsItemQtd').value)||1;
  const m = DB.alugaveis.find(x=>x.id===matId);
  if(!m) return;
  novoAluguerItens.push({item_id:m.id, nome:m.nome, cor:m.cor, modelo:m.modelo, qtd, precoUnit:m.precoDia});
  renderItensAluguerList();
}
function removeItemAluguer(idx){ novoAluguerItens.splice(idx,1); renderItensAluguerList(); }
function renderItensAluguerList(){
  const box = document.getElementById('rsItensList');
  const dataEntrega = document.getElementById('rsDataEntrega')?.value;
  const dataRecolha = document.getElementById('rsDataRecolha')?.value;
  let conflitos = [];
  box.innerHTML = novoAluguerItens.length? `<table style="width:100%;font-size:12.5px"><thead><tr><th style="text-align:left">Material</th><th>Qtd</th><th>Preço</th><th></th></tr></thead><tbody>
    ${novoAluguerItens.map((it,idx)=>{
      const m = DB.alugaveis.find(x=>x.id===it.item_id);
      const reservadoPeriodo = qtdReservadaPeriodo(it.item_id, dataEntrega, dataRecolha);
      const disponivel = m.quantidade - reservadoPeriodo;
      const conflito = it.qtd > disponivel;
      if(conflito) conflitos.push(`<b>${escapeHtml(it.nome)}</b>: pedido ${it.qtd}, disponível apenas ${Math.max(disponivel,0)} para o período selecionado.`);
      return `<tr ${conflito?'style="background:rgba(227,69,58,.08)"':''}>
        <td>${escapeHtml(it.nome)} ${it.cor?'('+escapeHtml(it.cor)+')':''}</td>
        <td style="text-align:center">${it.qtd} ${conflito?'⚠️':''}</td>
        <td style="text-align:center">${fmtMoney(it.precoUnit)}</td>
        <td style="text-align:center"><button class="btn btn-sm btn-danger" onclick="removeItemAluguer(${idx})">✕</button></td>
      </tr>`;
    }).join('')}
  </tbody></table>` : `<div style="font-size:12.5px;color:var(--text-mut)">Nenhum item adicionado ainda.</div>`;

  const conflitoBox = document.getElementById('rsConflitoBox');
  conflitoBox.innerHTML = conflitos.length? `<div class="badge danger" style="display:block;margin-top:10px;white-space:normal;padding:10px">⚠️ Conflito de reserva detetado:<br>${conflitos.join('<br>')}</div>` : '';
}
function qtdReservadaPeriodo(materialId, dataEntrega, dataRecolha){
  if(!dataEntrega || !dataRecolha) return qtdReservadaHoje(materialId);
  let total = 0;
  DB.alugueres.forEach(a=>{
    if(a.status==='cancelado' || a.status==='concluido') return;
    const overlap = !(a.dataRecolha < dataEntrega || a.dataEntrega > dataRecolha);
    if(!overlap) return;
    a.itens.forEach(i=>{ if(i.item_id===materialId) total += Number(i.qtd||0); });
  });
  return total;
}
function saveAluguer(){
  const fornecedorId = document.getElementById('rsFornecedor').value;
  if(!fornecedorId){ toast('Selecione um fornecedor','err'); return; }
  if(novoAluguerItens.length===0){ toast('Adicione pelo menos um material','err'); return; }
  const dataEntrega = document.getElementById('rsDataEntrega').value;
  const dataRecolha = document.getElementById('rsDataRecolha').value;
  let hasConflict = false;
  novoAluguerItens.forEach(it=>{
    const m = DB.alugaveis.find(x=>x.id===it.item_id);
    const reservado = qtdReservadaPeriodo(it.item_id, dataEntrega, dataRecolha);
    if(it.qtd > (m.quantidade - reservado)) hasConflict = true;
  });
  if(hasConflict){
    if(!confirm('Existem conflitos de disponibilidade para o período selecionado. Deseja continuar mesmo assim?')) return;
  }
  const aluguer = {
    id: uid('rs'), fornecedor_id: fornecedorId, evento_id:null,
    dataEvento: document.getElementById('rsDataEvento').value,
    dataEntrega, dataRecolha,
    itens: novoAluguerItens, status:'ativo',
    obs: document.getElementById('rsObs').value.trim()
  };
  DB.alugueres.push(aluguer);
  saveDB(); closeModal(); renderAluguerBody(); toast('Reserva criada com sucesso.','ok');
}
function viewAluguer(id){
  const a = DB.alugueres.find(x=>x.id===id);
  const total = a.itens.reduce((s,i)=>s+Number(i.qtd)*Number(i.precoUnit),0);
  openModal('Detalhes do Aluguer', `
    <p><b>Fornecedor:</b> ${escapeHtml(fornecedorNome(a.fornecedor_id))}</p>
    <p><b>Data:</b> ${fmtDate(a.dataEvento)} · <b>Entrega:</b> ${fmtDate(a.dataEntrega)} · <b>Recolha:</b> ${fmtDate(a.dataRecolha)}</p>

      <option value="ativo" ${a.status==='ativo'?'selected':''}>Ativo</option>
      <option value="concluido" ${a.status==='concluido'?'selected':''}>Concluído</option>
      <option value="cancelado" ${a.status==='cancelado'?'selected':''}>Cancelado</option>
    </select></p>
    <table style="width:100%;font-size:13px;margin-top:10px"><thead><tr><th style="text-align:left">Material</th><th>Qtd</th><th>Preço</th><th>Subtotal</th></tr></thead><tbody>
    ${a.itens.map(i=>`<tr><td>${escapeHtml(i.nome)}</td><td style="text-align:center">${i.qtd}</td><td style="text-align:center">${fmtMoney(i.precoUnit)}</td><td style="text-align:center">${fmtMoney(i.qtd*i.precoUnit)}</td></tr>`).join('')}
    </tbody></table>
    <p style="margin-top:10px;text-align:right;font-weight:700">Total: ${fmtMoney(total)}</p>
    ${a.obs? `<p style="margin-top:8px"><b>Obs:</b> ${escapeHtml(a.obs)}</p>`:''}
  `, `<button class="btn" onclick="closeModal()">Fechar</button><button class="btn btn-turq" onclick="exportAluguerPDF('${a.id}')">⬇ Exportar PDF</button>`, true);
}
async function exportAluguerPDF(id){
  const a = DB.alugueres.find(x=>x.id===id);
  if(!a) return;
  const f = DB.fornecedores.find(x=>x.id===a.fornecedor_id);

  const logoPng = await loadLogoPng();
  if(logoPng){ try{ doc.addImage(logoPng, 'PNG', 15, 10, 18, 18); }catch(e){} }
  doc.setFontSize(15); doc.setTextColor(91,42,134);
  doc.text('Aluguer / Reserva de Materiais', 40, 18);
  doc.setFontSize(9); doc.setTextColor(100);
  doc.text(DB.config.empresa.nome, 40, 24);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text(`Fornecedor: ${f? f.nome : '-'}${f&&f.telefone?' · '+f.telefone:''}`, 15, 34);
  doc.text(`Data do Aluguer: ${fmtDate(a.dataEvento)}   Entrega: ${fmtDate(a.dataEntrega)}   Recolha: ${fmtDate(a.dataRecolha)}`, 15, 40);
  const body = a.itens.map(i=>[i.nome, i.cor||'-', i.qtd, fmtMoney(i.precoUnit), fmtMoney(i.qtd*i.precoUnit)]);
  doc.autoTable({startY:46, head:[['Material','Cor','Qtd','Preço/dia','Subtotal']], body, headStyles:{fillColor:[91,42,134]}, styles:{fontSize:9}});
  let y = doc.lastAutoTable.finalY+10;
  const total = a.itens.reduce((s,i)=>s+i.qtd*i.precoUnit,0);
  doc.setFontSize(12); doc.setTextColor(91,42,134);
  doc.text(`Total: ${fmtMoney(total)}`, 15, y); y+=10;
  if(a.obs){ doc.setFontSize(9); doc.setTextColor(80); doc.text('Obs: '+a.obs, 15, y); y+=8; }
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text('Assinatura do fornecedor: ______________________________', 15, y+8);
  doc.text('Yolandia Decorações — Criamos · Decoramos · Encantamos', 15, 285);
  doc.save('Aluguer_'+(f?f.nome.replace(/\s+/g,'_'):'Fornecedor')+'_'+a.id.slice(-4)+'.pdf');
  toast('Aluguer exportado em PDF.','ok');
}

    ${id? `<p style="font-size:11px;color:var(--text-mut)">Ao definir o estado como "Finalizado", os consumíveis ainda pendentes no checklist deste evento serão automaticamente descontados do estoque.</p>`:''}
  `, `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-brand" onclick="saveEvento('${e.id||''}')">Guardar</button>`);
}
function autoConfirmarConsumiveisEvento(ev){
  (ev.materiais||[]).forEach(m=>{
    if(m.tipo==='consumivel' && !m.consumoConfirmado){
      const qtd = m.qtdUtilizada>0 ? m.qtdUtilizada : m.qtdNecessaria;
      const mat = DB.consumiveis.find(x=>x.id===m.item_id);
      if(mat){
        const antes = mat.quantidade;
        mat.quantidade = Math.max(Number(mat.quantidade||0) - qtd, 0);
        if(!mat.historico) mat.historico=[];
        mat.historico.push({data:todayISO(), campo:'Quantidade (consumo automático ao finalizar evento)', antes, depois:mat.quantidade, usuario:currentUserName()});
        DB.consumoConsumiveis.push({id:uid('cc'), material:mat.nome, quantidade:qtd, evento_id:ev.id, data:todayISO()});
      }
      m.qtdUtilizada = qtd;
      m.consumoConfirmado = true;
    }
  });
}
function saveEvento(id){
  const nome = document.getElementById('evNome').value.trim();
  if(!nome){ toast('Indique o nome do evento','err'); return; }
  const data = {
    cliente_id: document.getElementById('evCliente').value, nome_evento:nome,
    tipo: document.getElementById('evTipo').value, estado: document.getElementById('evEstado').value,
    local: document.getElementById('evLocal').value.trim(), telefone: document.getElementById('evTelefone').value.trim(),
    data: document.getElementById('evData').value, hora: document.getElementById('evHora').value,
    obs: document.getElementById('evObs').value.trim()
  };
  if(id){
    const ev = DB.eventos.find(x=>x.id===id);
    const estadoAnterior = ev.estado;
    Object.assign(ev, data);
    if(data.estado==='finalizado' && estadoAnterior!=='finalizado'){
      autoConfirmarConsumiveisEvento(ev);
    }
  }
  else{ data.id = uid('ev'); data.materiais=[]; DB.eventos.push(data); }
  saveDB(); closeModal();
  if(currentView==='eventos') renderEventosBody(); else if(currentView==='agenda') renderAgendaBody();
  toast('Evento guardado com sucesso.','ok');
}
function delEvento(id){
  if(!confirm('Remover este evento?')) return;
  DB.eventos = DB.eventos.filter(x=>x.id!==id); saveDB(); closeModal();
  if(currentView==='eventos') renderEventosBody(); else renderAgendaBody();
}

  `, `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-brand" onclick="addChecklistItem()">Adicionar</button>`);

function calcDisponibilidadeMaterial(materialId, tipo, excludeEventoId){
  const srcMap = {fixo:DB.materiaisFixos, alugavel:DB.alugaveis, consumivel:DB.consumiveis};
  const src = srcMap[tipo];
  const m = src.find(x=>x.id===materialId);
  if(!m) return 0;
  let comprometido = 0;
  DB.eventos.forEach(ev=>{
    if(ev.id===excludeEventoId) return;
    if(['finalizado','cancelado'].includes(ev.estado)) return;
    ev.materiais.forEach(mm=>{ if(mm.item_id===materialId && mm.tipo===tipo) comprometido += Number(mm.qtdNecessaria||0); });
  });
  if(tipo==='alugavel'){ comprometido += qtdReservadaHoje(materialId); }
  return m.quantidade - comprometido;
}
function addChecklistItem(){
  const [id, tipo] = document.getElementById('ckMatSel').value.split('|');
  const qtd = Number(document.getElementById('ckQtdNec').value)||1;
  const obsItem = document.getElementById('ckObsItem').value.trim();
  const srcMap = {fixo:DB.materiaisFixos, alugavel:DB.alugaveis, consumivel:DB.consumiveis};
  const src = srcMap[tipo];
  const m = src.find(x=>x.id===id);
  const e = DB.eventos.find(x=>x.id===checklistEventoId);

  const disponivel = calcDisponibilidadeMaterial(id, tipo, e.id);
  if(qtd > disponivel){
    const falta = qtd - Math.max(disponivel,0);
    const querAdicionar = confirm(`⚠️ Estoque insuficiente para "${m.nome}".\nDisponível: ${Math.max(disponivel,0)} · Necessário: ${qtd}\n\nDeseja adicionar ${falta} unidade(s) à Lista de Compra/Aluguer?`);
    if(querAdicionar){
      const categoria = tipo==='consumivel' ? 'Consumível' : (tipo==='alugavel' ? 'Material Alugável' : 'Material Fixo');
      addToListaCompras(m.nome, falta, e.id, tipo, id, categoria, m.unidade||'unid');
      toast('Item adicionado à Lista de Compra/Aluguer.','ok');
    }
  }
  e.materiais.push({item_id:id, tipo, nome:m.nome, unidade:m.unidade||'', qtdNecessaria:qtd, qtdDisponivel:Math.max(disponivel,0), qtdUtilizada:0, qtdEntregue:0, qtdDevolvida:0, qtdDanificada:0, qtdPerdida:0, entregue:false, montado:false, recolhido:false, conferido:false, consumoConfirmado:false, obs:obsItem});
  saveDB(); syncChecklistToFolhaCusto(checklistEventoId); closeModal(); renderChecklistBody(); toast('Material adicionado ao checklist.','ok');
}
function syncChecklistToFolhaCusto(eventoId){
  const ev = DB.eventos.find(x=>x.id===eventoId);
  if(!ev) return;
  let fac = DB.facturas.find(f=>f.evento_id===eventoId);
  if(!fac && ev.materiais.length===0) return;
  const catMap = {fixo:'Material Fixo', alugavel:'Material Alugável', consumivel:'Consumível'};
  const precoMap = {fixo:DB.materiaisFixos, alugavel:DB.alugaveis, consumivel:DB.consumiveis};
  const itensSync = ev.materiais.map(m=>{
    const src = precoMap[m.tipo]; const orig = src? src.find(x=>x.id===m.item_id) : null;
    const preco = orig? (m.tipo==='fixo'?orig.valor:m.tipo==='alugavel'?orig.precoDia:orig.precoCompra) : 0;
    return {item_id:m.item_id, nome:m.nome, categoria:catMap[m.tipo]||'Material Fixo', unidade:m.unidade||'unid', qtd:m.qtdNecessaria, precoUnit:preco};
  });
  if(fac){
    fac.itens = itensSync;
    fac.cliente_id = ev.cliente_id;
    fac.subtotal = itensSync.reduce((s,i)=>s+i.qtd*i.precoUnit,0);
    fac.valorFacturaProforma = fac.subtotal * (fac.multiplicador||2);
    fac.valorRetencao = fac.retencaoAtiva? fac.valorFacturaProforma*fac.percentualRetencao/100 : 0;
    fac.total = Math.max(fac.valorFacturaProforma - (fac.desconto||0) - fac.valorRetencao, 0);
  } else {
    const subtotal = itensSync.reduce((s,i)=>s+i.qtd*i.precoUnit,0);
    const multiplicador = 2;
    const valorFacturaProforma = subtotal*multiplicador;
    const retencaoAtiva = DB.config.retencaoFonte.ativo;
    const percentualRetencao = DB.config.retencaoFonte.percentual;
    const valorRetencao = retencaoAtiva? valorFacturaProforma*percentualRetencao/100 : 0;
    const total = Math.max(valorFacturaProforma - valorRetencao, 0);
    fac = {id:uid('fp'), numero: DB.config.proximoNumFactura, cliente_id: ev.cliente_id, evento_id: eventoId, data: todayISO(), itens: itensSync, subtotal, multiplicador, valorFacturaProforma, desconto:0, retencaoAtiva, percentualRetencao, valorRetencao, total, obs:'Sincronizado automaticamente a partir do Check List do evento "'+ev.nome_evento+'"', status:'rascunho'};
    DB.config.proximoNumFactura++;
    DB.facturas.push(fac);
  }
  saveDB();
}
function confirmarConsumoConsumivel(idx){
  const e = DB.eventos.find(x=>x.id===checklistEventoId);
  const item = e.materiais[idx];
  if(item.consumoConfirmado){ toast('Consumo já foi confirmado para este item.','err'); return; }
  const qtdStr = prompt('Quantidade efetivamente utilizada de "'+item.nome+'":', item.qtdNecessaria);
  if(qtdStr===null) return;
  const qtd = Number(qtdStr)||0;
  if(qtd<=0){ toast('Quantidade inválida.','err'); return; }
  const m = DB.consumiveis.find(x=>x.id===item.item_id);
  if(m){
    const antes = m.quantidade;
    m.quantidade = Math.max(Number(m.quantidade||0) - qtd, 0);
    if(!m.historico) m.historico=[];
    m.historico.push({data:todayISO(), campo:'Quantidade (consumo em evento)', antes, depois:m.quantidade, usuario:currentUserName()});
    DB.consumoConsumiveis.push({id:uid('cc'), material:m.nome, quantidade:qtd, evento_id:e.id, data:todayISO()});
  }
  item.qtdUtilizada = qtd;
  item.consumoConfirmado = true;
  saveDB(); renderChecklistBody(); toast('Consumo registado e estoque atualizado.','ok');
}

function saveEditChecklistItem(idx){
  const e = DB.eventos.find(x=>x.id===checklistEventoId);
  const m = e.materiais[idx];
  m.qtdNecessaria = Number(document.getElementById('ckEditNec').value)||0;

    m.qtdEntregue = Number(document.getElementById('ckEditEnt').value)||0;

    m.qtdUtilizada = Number(document.getElementById('ckEditUtil').value)||0;

  saveDB(); syncChecklistToFolhaCusto(checklistEventoId); closeModal(); renderChecklistBody(); toast('Item atualizado.','ok');

}

function addItemFactura(){
  const [id, preco, categoria, unidade] = document.getElementById('fpItemSel').value.split('|');
  const qtd = Number(document.getElementById('fpItemQtd').value)||1;
  const opt = document.getElementById('fpItemSel').selectedOptions[0].textContent;
  novaFacturaItens.push({item_id:id, nome:opt, categoria, unidade, qtd, precoUnit:Number(preco)});
  renderItensFacturaList();
}
function removeItemFactura(idx){ novaFacturaItens.splice(idx,1); renderItensFacturaList(); }
function custoTotalAtual(){ return novaFacturaItens.reduce((s,i)=>s+i.qtd*i.precoUnit,0); }
function getMultiplicadorAtual(){
  const sel = document.getElementById('fpMultiplicador');
  if(!sel) return 2;
  if(sel.value==='custom') return Number(document.getElementById('fpMultiplicadorCustom').value)||1;
  return Number(sel.value);
}
function onMultiplicadorChange(){
  const sel = document.getElementById('fpMultiplicador').value;
  document.getElementById('fpMultiplicadorCustomBox').style.display = sel==='custom'?'block':'none';
  recalcularValorProforma();
}
function recalcularValorProforma(){
  const custo = custoTotalAtual();
  const mult = getMultiplicadorAtual();
  const input = document.getElementById('fpValorFinal');
  if(input) input.value = (custo*mult).toFixed(2);
  renderTotaisFactura();
}
function renderItensFacturaList(skipRecalc){
  const box = document.getElementById('fpItensList');
  box.innerHTML = novaFacturaItens.length? `<table style="width:100%;font-size:11.5px"><thead><tr><th style="text-align:left">Item</th><th>Categoria</th><th>Qtd</th><th>Unid.</th><th>Custo Unit.</th><th>Subtotal</th><th></th></tr></thead><tbody>
    ${novaFacturaItens.map((it,idx)=>`<tr>
      <td>${escapeHtml(it.nome)}</td>
      <td><span class="badge purple" style="font-size:9px">${escapeHtml(it.categoria||'-')}</span></td>
      <td style="text-align:center"><input type="number" value="${it.qtd}" style="width:50px" onchange="novaFacturaItens[${idx}].qtd=Number(this.value); renderItensFacturaList()"></td>
      <td style="text-align:center">${escapeHtml(it.unidade||'-')}</td>
      <td style="text-align:center"><input type="number" value="${it.precoUnit}" style="width:70px" onchange="novaFacturaItens[${idx}].precoUnit=Number(this.value); renderItensFacturaList()"></td>
      <td style="text-align:center">${fmtMoney(it.qtd*it.precoUnit)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="removeItemFactura(${idx})">✕</button></td>
    </tr>`).join('')}
  </tbody></table>` : `<div style="font-size:12.5px;color:var(--text-mut)">Nenhum item adicionado.</div>`;
  const custoBox = document.getElementById('fpCustoTotalBox');
  if(custoBox) custoBox.innerHTML = `Custo Total (interno): <b>${fmtMoney(custoTotalAtual())}</b>`;
  if(skipRecalc){ renderTotaisFactura(); } else { recalcularValorProforma(); }
}
function renderTotaisFactura(){
  const box = document.getElementById('fpTotais');
  if(!box) return;
  const valorFinal = Number(document.getElementById('fpValorFinal')?.value)||0;
  const desconto = Number(document.getElementById('fpDesconto')?.value)||0;
  const retencaoAtiva = document.getElementById('fpRetencaoAtiva')?.checked;
  const percentual = DB.config.retencaoFonte.percentual;
  const valorRetencao = retencaoAtiva? valorFinal*percentual/100 : 0;
  const total = Math.max(valorFinal - desconto - valorRetencao, 0);
  box.innerHTML = `Valor da Factura Proforma: ${fmtMoney(valorFinal)}<br>Desconto: -${fmtMoney(desconto)}<br>${retencaoAtiva?`Retenção na Fonte (${percentual}%): -${fmtMoney(valorRetencao)}<br>`:''}<b style="font-size:16px;color:var(--roxo)">Total a Pagar: ${fmtMoney(total)}</b>`;
}
function saveFactura(){
  const clienteId = document.getElementById('fpCliente').value;
  if(!clienteId){ toast('Selecione um cliente','err'); return; }
  if(novaFacturaItens.length===0){ toast('Adicione pelo menos um item à folha de custo','err'); return; }
  const subtotal = custoTotalAtual();
  const multiplicador = getMultiplicadorAtual();
  const valorFacturaProforma = Number(document.getElementById('fpValorFinal').value)||0;
  const desconto = Number(document.getElementById('fpDesconto').value)||0;
  const retencaoAtiva = document.getElementById('fpRetencaoAtiva').checked;
  const percentualRetencao = DB.config.retencaoFonte.percentual;
  const valorRetencao = retencaoAtiva? valorFacturaProforma*percentualRetencao/100 : 0;
  const total = Math.max(valorFacturaProforma - desconto - valorRetencao, 0);
  const obs = document.getElementById('fpObs').value.trim();
  const data = document.getElementById('fpData').value;

  if(editingFacturaId){
    const existing = DB.facturas.find(x=>x.id===editingFacturaId);
    if(existing){
      Object.assign(existing, {cliente_id:clienteId, data, itens:novaFacturaItens, subtotal, multiplicador, valorFacturaProforma, desconto, retencaoAtiva, percentualRetencao, valorRetencao, total, obs});
      if(existing.status==='rascunho') existing.status='emitida';
    }
    editingFacturaId = null;
    saveDB(); closeModal(); renderFacturasBody();
    if(currentView==='checklist') renderChecklistBody();
    toast('Folha de Custo atualizada com sucesso.','ok');
    return;
  }

  const factura = {
    id: uid('fp'), numero: DB.config.proximoNumFactura, cliente_id: clienteId, evento_id:'', data,
    itens: novaFacturaItens, subtotal, multiplicador, valorFacturaProforma,
    desconto, retencaoAtiva, percentualRetencao, valorRetencao, total,
    obs, status:'emitida'
  };
  DB.config.proximoNumFactura++;
  DB.facturas.push(factura);
  saveDB(); closeModal(); renderFacturasBody(); toast('Folha de Custo gerada com sucesso.','ok');
}
function delFactura(id){
  if(!confirm('Remover esta folha de custo?')) return;
  DB.facturas = DB.facturas.filter(x=>x.id!==id); saveDB(); renderFacturasBody();
}
function getItemFoto(facturaItem){
  const map = {'Material Fixo':DB.materiaisFixos, 'Material Alugável':DB.alugaveis, 'Consumível':DB.consumiveis};
  const src = map[facturaItem.categoria];
  if(!src) return '';
  const m = src.find(x=>x.id===facturaItem.item_id);
  return m? (m.foto||'') : '';
}
function getItemCodigo(facturaItem){
  const map = {'Material Fixo':DB.materiaisFixos, 'Material Alugável':DB.alugaveis, 'Consumível':DB.consumiveis};
  const src = map[facturaItem.categoria];
  if(!src) return '-';
  const m = src.find(x=>x.id===facturaItem.item_id);
  if(!m) return '-';
  if(m.codigo) return m.codigo;
  return 'CS-'+String(m.id).slice(-4).toUpperCase();
}

function updateFacturaStatus(id, status){
  DB.facturas.find(x=>x.id===id).status = status; saveDB(); renderFacturasBody(); toast('Status atualizado.','ok');
}
async function exportFacturaPDF(id){
  const f = DB.facturas.find(x=>x.id===id);
  const cli = DB.clientes.find(c=>c.id===f.cliente_id);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const logoPng = await loadLogoPng();

  // ===== PÁGINA 1: FACTURA PROFORMA (só Cód., Descrição, Qtd, Desconto, Retenção, Total) =====
  if(logoPng){ try{ doc.addImage(logoPng, 'PNG', 15, 12, 20, 20); }catch(e){} }
  doc.setFontSize(16); doc.setTextColor(91,42,134);
  doc.text(DB.config.empresa.nome, 42, 20);
  doc.setFontSize(9); doc.setTextColor(100);
  doc.text(`${DB.config.empresa.telefone}  |  ${DB.config.empresa.email}`, 42, 26);
  doc.text(`NIF: ${DB.config.empresa.nif}  |  ${DB.config.empresa.endereco}`, 42, 31);
  doc.setDrawColor(220); doc.line(15,38,195,38);
  doc.setFontSize(13); doc.setTextColor(20);
  doc.text(`FACTURA PROFORMA Nº ${String(f.numero).padStart(4,'0')}`, 15, 48);
  doc.setFontSize(10);
  doc.text(`Cliente: ${cli?cli.nome:'-'}`, 15, 56);
  doc.text(`Data: ${fmtDate(f.data)}`, 150, 56);

  const body = f.itens.map(i=>[getItemCodigo(i), i.nome, i.qtd]);
  doc.autoTable({
    startY:64, head:[['Cód. Produto','Descrição do Produto','Quantidade']], body,
    headStyles:{fillColor:[91,42,134]}, styles:{fontSize:9.5}
  });
  let y = doc.lastAutoTable.finalY + 10;
  doc.setFontSize(11); doc.setTextColor(20);
  doc.text(`Desconto: -${fmtMoney(f.desconto)}`, 15, y); y+=7;
  if(f.retencaoAtiva){
    doc.setTextColor(227,69,58);
    doc.text(`Retenção na Fonte (${f.percentualRetencao}%): -${fmtMoney(f.valorRetencao)}`, 15, y); y+=7;
    doc.setTextColor(20);
  }
  y+=3;
  doc.setFontSize(14); doc.setTextColor(91,42,134);
  doc.text(`Valor Total: ${fmtMoney(f.total)}`, 15, y); y+=16;
  doc.setFontSize(9); doc.setTextColor(60);
  doc.text('Dados Bancários para Pagamento:', 15, y); y+=5;
  doc.text(`IBAN: ${DB.config.iban}`, 15, y); y+=5;
  doc.text(`Titular: ${DB.config.destinatario}`, 15, y); y+=10;
  doc.setTextColor(120);
  doc.text('Assinatura: _______________________', 15, y);
  doc.text('Yolandia Decorações — Criamos · Decoramos · Encantamos', 15, 285);

  // ===== PÁGINA(S) SEGUINTE(S): ANEXO COM FOTOS E QUANTIDADES (não faz parte da Factura Proforma) =====
  doc.addPage();
  doc.setFontSize(13); doc.setTextColor(91,42,134);
  doc.text('Anexo — Materiais e Consumíveis a Utilizar', 15, 18);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text(`Factura Proforma Nº ${String(f.numero).padStart(4,'0')} · Cliente: ${cli?cli.nome:'-'}`, 15, 25);

  let gx = 15, gy = 34; const boxSize = 30; const gap = 8; const perRow = 5; let col = 0;
  for(const item of f.itens){
    if(gy > 235 && col===0){ doc.addPage(); gy = 20; }
    const x = gx + col*(boxSize+gap);
    const foto = getItemFoto(item);
    const fmt = foto? detectImgFormat(foto) : null;
    if(fmt){
      try{ doc.addImage(foto, fmt, x, gy, boxSize, boxSize); }
      catch(e){ doc.setDrawColor(200); doc.rect(x,gy,boxSize,boxSize); }
    } else {
      doc.setDrawColor(200); doc.rect(x,gy,boxSize,boxSize);
    }
    doc.setFontSize(7); doc.setTextColor(60);
    const nomeCurto = item.nome.length>15? item.nome.slice(0,14)+'…' : item.nome;
    doc.text(nomeCurto, x+boxSize/2, gy+boxSize+4, {align:'center'});
    doc.setFontSize(7.5); doc.setTextColor(91,42,134);
    doc.text(`Qtd: ${item.qtd}`, x+boxSize/2, gy+boxSize+8, {align:'center'});
    col++;
    if(col>=perRow){ col=0; gy += boxSize+16; }
  }

  doc.save(`Factura_Proforma_${String(f.numero).padStart(4,'0')}.pdf`);
  toast('Factura Proforma exportada em PDF (2 páginas: factura + anexo de fotos).','ok');
}
async function exportFolhaCustoPDF(id){
  const f = DB.facturas.find(x=>x.id===id);
  const cli = DB.clientes.find(c=>c.id===f.cliente_id);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  const logoPng = await loadLogoPng();
  if(logoPng){ try{ doc.addImage(logoPng, 'PNG', 15, 10, 18, 18); }catch(e){} }
  doc.setFontSize(15); doc.setTextColor(91,42,134);
  doc.text('Folha de Custo (uso interno) Nº '+String(f.numero).padStart(4,'0'), 40, 18);
  doc.setFontSize(9); doc.setTextColor(100);
  doc.text(DB.config.empresa.nome, 40, 24);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text(`Cliente: ${cli?cli.nome:'-'}  |  Data: ${fmtDate(f.data)}`, 15, 32);
  const body = f.itens.map(i=>[i.nome, i.categoria||'-', i.qtd, i.unidade||'-', fmtMoney(i.precoUnit), fmtMoney(i.qtd*i.precoUnit)]);
  doc.autoTable({startY:38, head:[['Item','Categoria','Qtd','Unid.','Custo Unit.','Subtotal']], body, headStyles:{fillColor:[91,42,134]}, styles:{fontSize:8.5}});
  let y = doc.lastAutoTable.finalY + 8;
  doc.setFontSize(10); doc.setTextColor(20);
  doc.text(`Custo Total: ${fmtMoney(f.subtotal)}`, 15, y); y+=6;
  doc.text(`Multiplicador aplicado: x${f.multiplicador}`, 15, y); y+=6;
  doc.setFontSize(12); doc.setTextColor(91,42,134);
  doc.text(`Valor da Factura Proforma: ${fmtMoney(f.valorFacturaProforma)}`, 15, y); y+=10;
  doc.setFontSize(9); doc.setTextColor(150);
  doc.text('Documento interno — não enviar ao cliente', 15, 285);
  doc.save(`Folha_Custo_${String(f.numero).padStart(4,'0')}.pdf`);
  toast('Folha de Custo exportada em PDF (uso interno).','ok');
}
function printFactura(id){
  exportFacturaPDF(id);
}

function setFinTab(t){ financeiroTab=t; renderFinanceiro(); }
function finIndicadores(){
  const receitaTotal = DB.facturas.reduce((s,f)=>s+Number(f.total||0),0);
  const receitaPaga = DB.facturas.filter(f=>f.status==='paga').reduce((s,f)=>s+Number(f.total||0),0);
  const receitaPendente = DB.facturas.filter(f=>f.status!=='paga').reduce((s,f)=>s+Number(f.total||0),0);
  const adiantamentos = DB.adiantamentos.reduce((s,a)=>s+Number(a.valor||0),0);
  const totalRetido = DB.facturas.reduce((s,f)=>s+Number(f.valorRetencao||0),0);
  const totalCusto = DB.facturas.reduce((s,f)=>s+Number(f.subtotal||0),0);
  const despesaTotal = DB.despesas.reduce((s,d)=>s+Number(d.valor||0),0);
  const lucroLiquido = receitaPaga - despesaTotal;
  const ticketMedio = DB.clientes.length? receitaTotal/DB.clientes.length : 0;
  return {receitaTotal, receitaPaga, receitaPendente, adiantamentos, totalRetido, totalCusto, despesaTotal, lucroLiquido, ticketMedio};
}

  } else {
    const hoje = todayISO();
    const entradasHoje = DB.facturas.filter(f=>f.data===hoje).reduce((s,f)=>s+Number(f.total||0),0) + DB.adiantamentos.filter(a=>a.data===hoje).reduce((s,a)=>s+Number(a.valor||0),0);
