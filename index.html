<!DOCTYPE html>
<html lang="pt-AO">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Yolandia Decorações</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.1/jspdf.plugin.autotable.min.js"></script>
<style>
:root{
  --roxo:#5B2A86;
  --roxo-dark:#3E1C5E;
  --turquesa:#17A9B0;
  --rosa:#EC1E79;
  --amarelo:#F7B500;
  --bg:#F6F4FA;
  --surface:#FFFFFF;
  --surface-2:#F0EBF7;
  --text:#241533;
  --text-mut:#6B6178;
  --border:#E4DEF0;
  --radius:14px;
  --shadow:0 4px 18px rgba(60,20,90,0.08);
  --ok:#1FA96A;
  --warn:#F7B500;
  --danger:#E3453A;
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
}
[data-theme="dark"]{
  --bg:#1B1123;
  --surface:#251633;
  --surface-2:#2E1C40;
  --text:#F3EEFA;
  --text-mut:#B6A9C7;
  --border:#3B2751;
  --shadow:0 4px 18px rgba(0,0,0,0.35);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{background:var(--bg); color:var(--text); transition:background .2s,color .2s;}
img{max-width:100%;}
button{font-family:inherit; cursor:pointer;}
input,select,textarea{font-family:inherit;}
::-webkit-scrollbar{width:8px; height:8px;}
::-webkit-scrollbar-thumb{background:var(--border); border-radius:8px;}

.hidden{display:none !important;}

/* ---------- LOGIN ---------- */
#loginScreen{
  min-height:100vh; display:flex; align-items:center; justify-content:center;
  background:linear-gradient(135deg,var(--roxo) 0%, var(--roxo-dark) 55%, #241040 100%);
  padding:20px;
}
.login-card{
  background:var(--surface); border-radius:20px; padding:40px 36px; width:100%; max-width:380px;
  box-shadow:0 20px 60px rgba(0,0,0,0.35); text-align:center;
}
.login-card img.logo{width:120px; margin-bottom:6px;}
.login-card h1{font-size:20px; color:var(--roxo); margin-bottom:2px;}
.login-card p.tag{color:var(--text-mut); font-size:12px; letter-spacing:.08em; text-transform:uppercase; margin-bottom:22px;}
.field{text-align:left; margin-bottom:14px;}
.field label{display:block; font-size:12px; font-weight:600; color:var(--text-mut); margin-bottom:5px;}
.field input, .field select, .field textarea{
  width:100%; padding:11px 13px; border-radius:10px; border:1.5px solid var(--border);
  background:var(--surface-2); color:var(--text); font-size:14px; outline:none;
}
.field input:focus, .field select:focus, .field textarea:focus{border-color:var(--turquesa);}
.role-toggle{display:flex; gap:8px; margin-bottom:18px;}
.role-toggle button{
  flex:1; padding:10px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface-2);
  color:var(--text-mut); font-weight:600; font-size:13px;
}
.role-toggle button.active{background:var(--roxo); color:#fff; border-color:var(--roxo);}
.btn-primary{
  width:100%; padding:13px; border:none; border-radius:12px; font-weight:700; font-size:14px;
  background:linear-gradient(135deg,var(--rosa),var(--roxo)); color:#fff; letter-spacing:.02em;
  box-shadow:0 8px 20px rgba(91,42,134,0.35);
}
.btn-primary:active{transform:scale(.98);}
.login-hint{margin-top:16px; font-size:11px; color:var(--text-mut);}

/* ---------- APP SHELL ---------- */
#appShell{display:none; min-height:100vh;}
#appShell.active{display:flex;}
.sidebar{
  width:236px; background:var(--roxo-dark); color:#fff; display:flex; flex-direction:column;
  flex-shrink:0; height:100vh; position:sticky; top:0; overflow-y:auto;
}
.sidebar-brand{display:flex; align-items:center; gap:10px; padding:18px 16px; border-bottom:1px solid rgba(255,255,255,0.1);}
.sidebar-brand img{width:38px; height:38px; object-fit:contain;}
.sidebar-brand .name{font-weight:800; font-size:15px; line-height:1.1;}
.sidebar-brand .sub{font-size:9px; color:#D9C6EE; text-transform:uppercase; letter-spacing:.08em;}
.nav-list{list-style:none; padding:10px; flex:1;}
.nav-list li{margin-bottom:3px;}
.nav-list button{
  width:100%; text-align:left; background:none; border:none; color:#E4D6F3; padding:10px 12px;
  border-radius:10px; font-size:13.5px; font-weight:500; display:flex; align-items:center; gap:10px;
}
.nav-list button:hover{background:rgba(255,255,255,0.08);}
.nav-list button.active{background:linear-gradient(135deg,var(--rosa),var(--turquesa)); color:#fff; font-weight:700;}
.nav-list .ic{font-size:16px; width:18px; text-align:center;}
.sidebar-footer{padding:14px 16px; border-top:1px solid rgba(255,255,255,0.1); font-size:10.5px; color:#C7B4DD;}

.main{flex:1; display:flex; flex-direction:column; min-width:0;}
.topbar{
  background:var(--surface); border-bottom:1px solid var(--border); padding:14px 24px;
  display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:20;
}
.topbar h2{font-size:19px; color:var(--roxo); display:flex; align-items:center; gap:8px;}
[data-theme="dark"] .topbar h2{color:#D9B8F0;}
.topbar-actions{display:flex; align-items:center; gap:10px;}
.icon-btn{
  width:36px; height:36px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface-2);
  display:flex; align-items:center; justify-content:center; font-size:16px; color:var(--text);
}
.user-chip{display:flex; align-items:center; gap:8px; padding:6px 12px 6px 6px; border-radius:20px; background:var(--surface-2); font-size:12.5px; font-weight:600;}
.user-chip .av{width:26px; height:26px; border-radius:50%; background:linear-gradient(135deg,var(--rosa),var(--amarelo)); display:flex; align-items:center; justify-content:center; color:#fff; font-weight:800; font-size:12px;}

.content{padding:22px 24px 60px; flex:1;}
.footer-brand{text-align:center; padding:16px; font-size:11px; color:var(--text-mut); border-top:1px solid var(--border);}

/* ---------- COMPONENTS ---------- */
.grid{display:grid; gap:16px;}
.grid-4{grid-template-columns:repeat(4,1fr);}
.grid-3{grid-template-columns:repeat(3,1fr);}
.grid-2{grid-template-columns:repeat(2,1fr);}
@media(max-width:1100px){.grid-4{grid-template-columns:repeat(2,1fr);} .grid-3{grid-template-columns:repeat(2,1fr);}}
@media(max-width:700px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr;}}

.card{background:var(--surface); border-radius:var(--radius); padding:18px; box-shadow:var(--shadow); border:1px solid var(--border);}
.stat-card{position:relative; overflow:hidden;}
.stat-card .stat-ic{width:40px; height:40px; border-radius:11px; display:flex; align-items:center; justify-content:center; font-size:19px; margin-bottom:10px;}
.stat-card .stat-val{font-size:26px; font-weight:800;}
.stat-card .stat-lbl{font-size:12px; color:var(--text-mut); font-weight:600;}
.stat-card .stat-trend{position:absolute; right:14px; top:14px; font-size:10px; padding:3px 8px; border-radius:20px; font-weight:700;}

.section-title{display:flex; align-items:center; justify-content:between; justify-content:space-between; margin:26px 0 12px;}
.section-title h3{font-size:16px; color:var(--text);}
.section-title h3 .dot{display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:8px;}

.btn{padding:9px 16px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface-2); color:var(--text); font-weight:600; font-size:13px; display:inline-flex; align-items:center; gap:6px;}
.btn:hover{filter:brightness(0.97);}
.btn-brand{background:linear-gradient(135deg,var(--rosa),var(--roxo)); color:#fff; border:none; box-shadow:0 6px 16px rgba(91,42,134,0.3);}
.btn-turq{background:linear-gradient(135deg,var(--turquesa),#0E7B80); color:#fff; border:none;}
.btn-sm{padding:6px 10px; font-size:12px; border-radius:8px;}
.btn-danger{background:var(--danger); color:#fff; border:none;}
.btn-ghost{background:transparent; border:1.5px dashed var(--border);}

.toolbar{display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:14px;}
.toolbar .search{flex:1; min-width:180px;}
.search input{width:100%; padding:9px 14px; border-radius:10px; border:1.5px solid var(--border); background:var(--surface-2); color:var(--text); font-size:13px;}
.tabs{display:flex; gap:6px; margin-bottom:16px; flex-wrap:wrap;}
.tabs button{padding:8px 14px; border-radius:9px; border:1.5px solid var(--border); background:var(--surface-2); font-size:12.5px; font-weight:600; color:var(--text-mut);}
.tabs button.active{background:var(--roxo); color:#fff; border-color:var(--roxo);}

table{width:100%; border-collapse:collapse; font-size:13px;}
thead th{text-align:left; padding:10px 12px; color:var(--text-mut); font-size:11px; text-transform:uppercase; letter-spacing:.04em; border-bottom:2px solid var(--border);}
tbody td{padding:11px 12px; border-bottom:1px solid var(--border);}
tbody tr:hover{background:var(--surface-2);}
.table-wrap{overflow-x:auto; background:var(--surface); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow);}

.badge{display:inline-flex; align-items:center; gap:5px; padding:4px 10px; border-radius:20px; font-size:11px; font-weight:700;}
.badge.ok{background:rgba(31,169,106,.14); color:var(--ok);}
.badge.warn{background:rgba(247,181,0,.16); color:#946400;}
.badge.danger{background:rgba(227,69,58,.14); color:var(--danger);}
.badge.info{background:rgba(23,169,176,.15); color:#0C7278;}
.badge.muted{background:var(--surface-2); color:var(--text-mut);}
.badge.purple{background:rgba(91,42,134,.13); color:var(--roxo);}
[data-theme="dark"] .badge.purple{color:#D9B8F0;}

.thumb{width:40px; height:40px; border-radius:9px; object-fit:cover; background:var(--surface-2); display:flex; align-items:center; justify-content:center; font-size:16px;}

.empty-state{text-align:center; padding:50px 20px; color:var(--text-mut);}
.empty-state .em-ic{font-size:38px; margin-bottom:10px;}
.empty-state .em-t{font-weight:700; color:var(--text); margin-bottom:4px;}

/* Modal */
.modal-overlay{
  position:fixed; inset:0; background:rgba(20,10,30,0.55); display:none; align-items:center; justify-content:center;
  z-index:100; padding:20px;
}
.modal-overlay.active{display:flex;}
.modal{background:var(--surface); border-radius:18px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; box-shadow:0 30px 80px rgba(0,0,0,0.4);}
.modal.wide{max-width:820px;}
.modal-head{display:flex; align-items:center; justify-content:space-between; padding:18px 22px; border-bottom:1px solid var(--border); position:sticky; top:0; background:var(--surface); z-index:2;}
.modal-head h3{font-size:16px;}
.modal-close{width:30px; height:30px; border-radius:8px; border:none; background:var(--surface-2); font-size:16px;}
.modal-body{padding:20px 22px;}
.modal-foot{padding:16px 22px; border-top:1px solid var(--border); display:flex; justify-content:flex-end; gap:10px; position:sticky; bottom:0; background:var(--surface);}
.form-row{display:grid; grid-template-columns:1fr 1fr; gap:12px;}
@media(max-width:560px){.form-row{grid-template-columns:1fr;}}

.toast-wrap{position:fixed; top:18px; right:18px; z-index:200; display:flex; flex-direction:column; gap:8px;}
.toast{background:var(--surface); border-left:4px solid var(--turquesa); box-shadow:var(--shadow); border-radius:10px; padding:12px 16px; font-size:13px; min-width:220px; animation:slideIn .25s ease;}
.toast.ok{border-color:var(--ok);}
.toast.err{border-color:var(--danger);}
@keyframes slideIn{from{transform:translateX(30px); opacity:0;} to{transform:translateX(0); opacity:1;}}

/* calendar */
.cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:6px;}
.cal-dow{text-align:center; font-size:11px; font-weight:700; color:var(--text-mut); padding-bottom:4px;}
.cal-cell{min-height:86px; border-radius:10px; border:1px solid var(--border); padding:6px; background:var(--surface); font-size:11px; position:relative;}
.cal-cell.other{opacity:.35;}
.cal-cell.today{border:2px solid var(--turquesa);}
.cal-daynum{font-weight:700; font-size:12px; margin-bottom:4px;}
.cal-ev{border-radius:6px; padding:2px 6px; font-size:10px; margin-bottom:2px; color:#fff; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; cursor:pointer;}
.legend{display:flex; flex-wrap:wrap; gap:10px; margin-bottom:14px;}
.legend .lg-item{display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--text-mut); font-weight:600;}
.legend .lg-dot{width:9px; height:9px; border-radius:50%;}

.checklist-item{display:flex; align-items:center; justify-content:space-between; padding:10px 12px; border:1px solid var(--border); border-radius:10px; margin-bottom:8px; background:var(--surface-2);}
.chk-boxes{display:flex; gap:14px; flex-wrap:wrap;}
.chk-boxes label{display:flex; align-items:center; gap:5px; font-size:11.5px; color:var(--text-mut); font-weight:600;}

.kpi-mini{display:flex; align-items:center; gap:10px;}
.kpi-mini .kpi-ic{width:34px; height:34px; border-radius:9px; display:flex; align-items:center; justify-content:center; font-size:16px; flex-shrink:0;}
.progress-bar{height:6px; border-radius:6px; background:var(--surface-2); overflow:hidden; margin-top:6px;}
.progress-bar span{display:block; height:100%; border-radius:6px;}

.print-only{display:none;}
@media print{
  .sidebar,.topbar,.no-print{display:none !important;}
  .content{padding:0;}
  body{background:#fff;}
}
</style>
</head>
<body>

<div class="toast-wrap" id="toastWrap"></div>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-card">
    <img class="logo" id="loginLogo" src="" alt="Yolandia Decorações">
    <h1>Yolandia Decorações</h1>
    <p class="tag">Criamos · Decoramos · Encantamos</p>
    <div class="role-toggle">
      <button type="button" class="active" data-role="admin" onclick="selectRole('admin')">Administrador</button>
      <button type="button" data-role="funcionario" onclick="selectRole('funcionario')">Funcionário</button>
    </div>
    <div class="field">
      <label>Nome de utilizador</label>
      <input id="loginUser" placeholder="ex: yolanda">
    </div>
    <div class="field">
      <label>Senha</label>
      <input id="loginPass" type="password" placeholder="••••••••">
    </div>
    <button class="btn-primary" onclick="doLogin()">Entrar</button>
    <p class="login-hint">Utilizador padrão: <b>admin</b> / senha: <b>admin</b></p>
  </div>
</div>

<!-- APP -->
<div id="appShell">
  <aside class="sidebar">
    <div class="sidebar-brand">
      <img id="sideLogo" src="" alt="logo">
      <div>
        <div class="name">Yolandia</div>
        <div class="sub">Decorações</div>
      </div>
    </div>
    <ul class="nav-list" id="navList"></ul>
    <div class="sidebar-footer">
      Yolandia Decorações © <span id="yrNow"></span><br>Sistema de Gestão v1.0
    </div>
  </aside>

  <div class="main">
    <div class="topbar no-print">
      <h2 id="pageTitle">Dashboard</h2>
      <div class="topbar-actions">
        <button class="icon-btn" onclick="toggleTheme()" title="Alternar tema">🌗</button>
        <button class="icon-btn" onclick="doLogout()" title="Sair">⎋</button>
        <div class="user-chip"><span class="av" id="userAv">A</span><span id="userLbl">Admin</span></div>
      </div>
    </div>
    <div class="content" id="content"></div>
    <div class="footer-brand no-print">Yolandia Decorações — Sistema de Gestão Interno · Todos os direitos reservados</div>
  </div>
</div>

<!-- Generic Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox">
    <div class="modal-head">
      <h3 id="modalTitle">Título</h3>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot" id="modalFoot"></div>
  </div>
</div>

function loadDB(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){ DB = JSON.parse(raw); }
    else{ DB = seedData(); saveDB(); }
    if(!DB.despesas) DB.despesas=[];
    if(!DB.adiantamentos) DB.adiantamentos=[];
    if(!DB.listaCompras) DB.listaCompras=[];
    if(!DB.ocorrencias) DB.ocorrencias=[];
  }catch(e){
    console.error('Erro ao carregar dados, a reiniciar.', e);
    DB = seedData(); saveDB();
  }
}
function saveDB(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(DB)); }
  catch(e){ toast('Erro ao guardar dados localmente.', 'err'); }
}

function getStockAvailable(itemId,tipo){
  if(tipo==='fixo'){
    const item = DB.materiaisFixos.find(x=>x.id===itemId);
    return item? Number(item.quantidade||0) : 0;
  }
  if(tipo==='alugavel'){
    const item = DB.alugaveis.find(x=>x.id===itemId);
    return item? Number(item.quantidade||0) : 0;
  }
  return 0;
}
function reserveStock(itemId,tipo,qty){
  if(qty<=0) return;
  const item = tipo==='fixo' ? DB.materiaisFixos.find(x=>x.id===itemId) : DB.alugaveis.find(x=>x.id===itemId);
  if(!item) return;
  item.quantidade = Math.max(Number(item.quantidade||0) - qty, 0);
  if(!item.historico) item.historico = [];
  item.historico.push({ data: todayISO(), acao: 'reserva checklist', quantidade: qty, evento_id: checklistEventoId });
}
function addToPurchaseList(itemId,tipo,nome,missingQty,eventoId){
  if(missingQty<=0) return;
  const exists = DB.listaCompras.find(x=>x.item_id===itemId && x.evento_id===eventoId && x.tipo===tipo);
  if(exists){
    exists.quantidade = Math.max(exists.quantidade, missingQty);
    exists.dataNecessidade = todayISO();
  } else {
    DB.listaCompras.push({ id: uid('lc'), item_id: itemId, tipo, nome, quantidade: missingQty, evento_id: eventoId, dataNecessidade: todayISO() });
  }
  saveDB();
  toast(`Item adicionado à Lista de Compra/Aluguer: ${missingQty} x ${nome}`, 'ok');
}

function toast(msg, type){
  const wrap = document.getElementById('toastWrap');
  const t = document.createElement('div');
  t.className = 'toast '+(type||'');

  wrap.appendChild(t);
  setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity .3s'; setTimeout(()=>t.remove(),300); }, 3200);

function computeStock(){
  const totalMat = DB.materiaisFixos.reduce((s,m)=>s+Number(m.quantidade||0),0) + DB.alugaveis.reduce((s,m)=>s+Number(m.quantidade||0),0);
  const alugados = DB.alugueres.filter(a=>a.status==='ativo').reduce((s,a)=>s+a.itens.reduce((x,i)=>x+Number(i.qtd||0),0),0);
  const disponiveis = Math.max(totalMat - alugados,0);
  return {totalMat, alugados, disponiveis};
}

  `;

function setCalMode(m){ calMode=m; renderAgendaBody(); }
function calShift(dir){
  if(calMode==='mes') calCursor.setMonth(calCursor.getMonth()+dir);
  else if(calMode==='semana') calCursor.setDate(calCursor.getDate()+7*dir);
  else calCursor.setDate(calCursor.getDate()+dir);
  renderAgendaBody();
}
function eventosFiltrados(){
  const q = (document.getElementById('agSearch')?.value||'').toLowerCase();
  if(!q) return DB.eventos;
  return DB.eventos.filter(e=> (clienteNome(e.cliente_id)+' '+e.local).toLowerCase().includes(q));
}
function renderAgendaBody(){
  const evs = eventosFiltrados();
  const months = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
  const dows = ['Dom','Seg','Ter','Qua','Qui','Sex','Sáb'];
  const body = document.getElementById('calBody');
  const label = document.getElementById('calLabel');

  if(calMode==='mes'){
    label.textContent = months[calCursor.getMonth()]+' '+calCursor.getFullYear();
    const first = new Date(calCursor.getFullYear(), calCursor.getMonth(), 1);
    const startDow = first.getDay();
    const daysInMonth = new Date(calCursor.getFullYear(), calCursor.getMonth()+1, 0).getDate();
    const prevDays = new Date(calCursor.getFullYear(), calCursor.getMonth(), 0).getDate();
    let cells = [];
    for(let i=startDow-1;i>=0;i--) cells.push({d:prevDays-i, other:true});
    for(let i=1;i<=daysInMonth;i++) cells.push({d:i, other:false});
    while(cells.length%7!==0) cells.push({d:cells.length,other:true});
    const todayStr = todayISO();
    let html = '<div class="cal-grid">' + dows.map(d=>`<div class="cal-dow">${d}</div>`).join('');
    cells.forEach(cell=>{
      const dateStr = cell.other? '' : `${calCursor.getFullYear()}-${String(calCursor.getMonth()+1).padStart(2,'0')}-${String(cell.d).padStart(2,'0')}`;
      const dayEvs = cell.other? [] : evs.filter(e=>e.data===dateStr);
      html += `<div class="cal-cell ${cell.other?'other':''} ${dateStr===todayStr?'today':''}">
        <div class="cal-daynum">${cell.d}</div>
        ${dayEvs.slice(0,3).map(e=>`<div class="cal-ev" style="background:${EVENTO_STATUS[e.estado].color}" onclick="openEventoDetalhe('${e.id}')" title="${escapeHtml(e.nome_evento)}">${escapeHtml(e.nome_evento)}</div>`).join('')}
        ${dayEvs.length>3? `<div style="font-size:9px;color:var(--text-mut)">+${dayEvs.length-3} mais</div>`:''}
      </div>`;
    });
    html += '</div>';
    body.innerHTML = html;
  } else if(calMode==='semana'){
    const start = new Date(calCursor); start.setDate(start.getDate()-start.getDay());
    label.textContent = 'Semana de ' + start.toLocaleDateString('pt-PT');
    let html = '<div style="display:flex;flex-direction:column;gap:8px">';
    for(let i=0;i<7;i++){
      const d = new Date(start); d.setDate(start.getDate()+i);
      const dateStr = d.toISOString().slice(0,10);
      const dayEvs = evs.filter(e=>e.data===dateStr);
      html += `<div style="display:flex;gap:10px;align-items:flex-start;border-bottom:1px solid var(--border);padding-bottom:8px">
        <div style="width:90px;font-weight:700;font-size:12.5px">${dows[d.getDay()]} ${d.getDate()}/${d.getMonth()+1}</div>
        <div style="flex:1;display:flex;flex-wrap:wrap;gap:6px">
        ${dayEvs.length? dayEvs.map(e=>`<div class="cal-ev" style="background:${EVENTO_STATUS[e.estado].color};position:static" onclick="openEventoDetalhe('${e.id}')">${escapeHtml(e.nome_evento)} · ${e.hora||''}</div>`).join('') : '<span style="font-size:12px;color:var(--text-mut)">Sem eventos</span>'}
        </div>
      </div>`;
    }
    html += '</div>';
    body.innerHTML = html;
  } else {
    const dateStr = calCursor.toISOString().slice(0,10);
    label.textContent = calCursor.toLocaleDateString('pt-PT', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    const dayEvs = evs.filter(e=>e.data===dateStr);
    body.innerHTML = dayEvs.length ? dayEvs.map(e=>`
      <div class="checklist-item" onclick="openEventoDetalhe('${e.id}')" style="cursor:pointer">
        <div>
          <div style="font-weight:700">${escapeHtml(e.nome_evento)} <span class="badge" style="background:${EVENTO_STATUS[e.estado].color}22;color:${EVENTO_STATUS[e.estado].color}">${EVENTO_STATUS[e.estado].label}</span></div>
          <div style="font-size:12px;color:var(--text-mut)">${escapeHtml(e.local)} · ${e.hora||'—'} · ${clienteNome(e.cliente_id)}</div>
        </div>
      </div>`).join('') : emptyMini('Sem eventos neste dia');
  }

  // alerts: lembretes
  const hoje = todayISO();
  const amanha = new Date(); amanha.setDate(amanha.getDate()+1);
  const amanhaStr = amanha.toISOString().slice(0,10);
  let alerts = [];
  DB.eventos.forEach(e=>{
    if(e.data===amanhaStr && e.estado!=='cancelado') alerts.push(`🔔 Evento amanhã: <b>${escapeHtml(e.nome_evento)}</b> — ${escapeHtml(e.local)}`);
  });
  DB.alugueres.forEach(a=>{
    if(a.dataEntrega===hoje) alerts.push(`🚚 Entrega hoje para <b>${escapeHtml(clienteNome(a.cliente_id))}</b>`);
    if(a.dataRecolha===hoje) alerts.push(`🔄 Recolha hoje de <b>${escapeHtml(clienteNome(a.cliente_id))}</b>`);
  });
  const alertBox = document.getElementById('agendaAlerts');
  alertBox.innerHTML = alerts.length? `<div class="card"><h3 style="margin-bottom:10px">🔔 Lembretes</h3>${alerts.map(a=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">${a}</div>`).join('')}</div>` : '';
}

function fileToBase64(input, cb){

  const reader = new FileReader();
  reader.onload = e=>cb(e.target.result);
  reader.readAsDataURL(f);
}

function qtdReservadaHoje(materialId){
  // soma quantidade reservada em alugueres ativos (não concluídos/cancelados)

  DB.alugueres.forEach(a=>{

    a.itens.forEach(i=>{ if(i.item_id===materialId) total += Number(i.qtd||0); });
  });
  return total;
}

  novoAluguerItens.push({item_id:m.id, nome:m.nome, cor:m.cor, modelo:m.modelo, qtd, precoUnit:m.precoDia});
  renderItensAluguerList();
}
function removeItemAluguer(idx){ novoAluguerItens.splice(idx,1); renderItensAluguerList(); }
function renderItensAluguerList(){
  const box = document.getElementById('rsItensList');
  const dataEntrega = document.getElementById('rsDataEntrega')?.value;
  const dataRecolha = document.getElementById('rsDataRecolha')?.value;
  let conflitos = [];
  box.innerHTML = novoAluguerItens.length? `<table style="width:100%;font-size:12.5px"><thead><tr><th style="text-align:left">Material</th><th>Qtd</th><th>Preço</th><th></th></tr></thead><tbody>
    ${novoAluguerItens.map((it,idx)=>{
      const m = DB.alugaveis.find(x=>x.id===it.item_id);
      const reservadoPeriodo = qtdReservadaPeriodo(it.item_id, dataEntrega, dataRecolha);
      const disponivel = m.quantidade - reservadoPeriodo;
      const conflito = it.qtd > disponivel;
      if(conflito) conflitos.push(`<b>${escapeHtml(it.nome)}</b>: pedido ${it.qtd}, disponível apenas ${Math.max(disponivel,0)} para o período selecionado.`);
      return `<tr ${conflito?'style="background:rgba(227,69,58,.08)"':''}>
        <td>${escapeHtml(it.nome)} ${it.cor?'('+escapeHtml(it.cor)+')':''}</td>
        <td style="text-align:center">${it.qtd} ${conflito?'⚠️':''}</td>
        <td style="text-align:center">${fmtMoney(it.precoUnit)}</td>
        <td style="text-align:center"><button class="btn btn-sm btn-danger" onclick="removeItemAluguer(${idx})">✕</button></td>
      </tr>`;
    }).join('')}
  </tbody></table>` : `<div style="font-size:12.5px;color:var(--text-mut)">Nenhum item adicionado ainda.</div>`;

  const conflitoBox = document.getElementById('rsConflitoBox');
  conflitoBox.innerHTML = conflitos.length? `<div class="badge danger" style="display:block;margin-top:10px;white-space:normal;padding:10px">⚠️ Conflito de reserva detetado:<br>${conflitos.join('<br>')}</div>` : '';
}
function qtdReservadaPeriodo(materialId, dataEntrega, dataRecolha){
  if(!dataEntrega || !dataRecolha) return qtdReservadaHoje(materialId);
  let total = 0;
  DB.alugueres.forEach(a=>{
    if(a.status==='cancelado' || a.status==='concluido') return;
    // overlap check
    const overlap = !(a.dataRecolha < dataEntrega || a.dataEntrega > dataRecolha);
    if(!overlap) return;
    a.itens.forEach(i=>{ if(i.item_id===materialId) total += Number(i.qtd||0); });
  });
  return total;
}
function saveAluguer(){
  const clienteId = document.getElementById('rsCliente').value;
  if(!clienteId){ toast('Selecione um cliente','err'); return; }
  if(novoAluguerItens.length===0){ toast('Adicione pelo menos um material','err'); return; }
  const dataEntrega = document.getElementById('rsDataEntrega').value;
  const dataRecolha = document.getElementById('rsDataRecolha').value;
  // final conflict check
  let hasConflict = false;
  novoAluguerItens.forEach(it=>{
    const m = DB.alugaveis.find(x=>x.id===it.item_id);
    const reservado = qtdReservadaPeriodo(it.item_id, dataEntrega, dataRecolha);
    if(it.qtd > (m.quantidade - reservado)) hasConflict = true;
  });
  if(hasConflict){
    if(!confirm('Existem conflitos de disponibilidade para o período selecionado. Deseja continuar mesmo assim?')) return;
  }
  const aluguer = {
    id: uid('rs'), cliente_id: clienteId, evento_id:null,
    dataEvento: document.getElementById('rsDataEvento').value,
    dataEntrega, dataRecolha,
    itens: novoAluguerItens, status:'ativo',
    obs: document.getElementById('rsObs').value.trim()
  };
  DB.alugueres.push(aluguer);
  saveDB(); closeModal(); renderAluguerBody(); toast('Reserva criada com sucesso.','ok');
}

function openAddChecklistItem(){
  const allMats = [...DB.materiaisFixos.map(m=>({id:m.id,nome:m.nome,tipo:'fixo'})), ...DB.alugaveis.map(m=>({id:m.id,nome:m.nome,tipo:'alugavel'}))];
  openModal('Adicionar material ao evento', `

function addChecklistItem(){
  const [id, tipo] = document.getElementById('ckMatSel').value.split('|');
  const qtd = Number(document.getElementById('ckQtdNec').value)||1;
  const src = tipo==='fixo'? DB.materiaisFixos : DB.alugaveis;
  const m = src.find(x=>x.id===id);
  const e = DB.eventos.find(x=>x.id===checklistEventoId);
  const available = getStockAvailable(id,tipo);
  const reserveQty = Math.min(available, qtd);
  const missingQty = qtd - reserveQty;
  if(reserveQty > 0){
    reserveStock(id,tipo,reserveQty);
  }
  if(missingQty > 0){
    addToPurchaseList(id,tipo,m.nome, missingQty, e.id);
    toast(`Estoque insuficiente: ${missingQty} unidade(s) foram adicionadas à Lista de Compra/Aluguer.`, 'warn');
  } else {
    toast('Material adicionado ao checklist e reservado no estoque.','ok');
  }
  e.materiais.push({item_id:id, tipo, nome:m.nome, qtdNecessaria:qtd, qtdEntregue:0, qtdDevolvida:0, qtdDanificada:0, qtdPerdida:0, entregue:false, montado:false, recolhido:false, conferido:false});
  saveDB(); closeModal(); renderChecklistBody();
}

      <td><b>${escapeHtml(c.nome)}</b>${c.empresa?'':''}</td>
      <td>${escapeHtml(c.telefone)}</td>
      <td>${escapeHtml(c.email)}</td>
      <td>${escapeHtml(c.empresa)||'-'}</td>
      <td>${nAlug}</td>
      <td>${nFact}</td>
      <td style="white-space:nowrap"><button class="btn btn-sm" onclick="viewCliente('${c.id}')">👁</button> <button class="btn btn-sm" onclick="openClienteForm('${c.id}')">✎</button> <button class="btn btn-sm btn-danger" onclick="delCliente('${c.id}')">🗑</button></td>
    </tr>`;
  }).join('') : `<tr><td colspan="7"><div class="empty-state"><div class="em-ic">👥</div><div class="em-t">Nenhum cliente encontrado</div></div></td></tr>`;
}
function openClienteForm(id){
  const c = id? DB.clientes.find(x=>x.id===id) : {id:null, nome:'', telefone:'', email:'', morada:'', nif:'', empresa:'', obs:''};
  openModal(id?'Editar Cliente':'Novo Cliente', `

    <div class="form-row">
      <div class="field"><label>Telefone</label><input id="clTelefone" value="${escapeHtml(c.telefone)}"></div>
      <div class="field"><label>Email</label><input id="clEmail" value="${escapeHtml(c.email)}"></div>
    </div>
    <div class="field"><label>Morada</label><input id="clMorada" value="${escapeHtml(c.morada)}"></div>
    <div class="form-row">
      <div class="field"><label>NIF</label><input id="clNif" value="${escapeHtml(c.nif)}"></div>
      <div class="field"><label>Empresa</label><input id="clEmpresa" value="${escapeHtml(c.empresa)}"></div>
    </div>
    <div class="field"><label>Observações</label><textarea id="clObs" rows="2">${escapeHtml(c.obs)}</textarea></div>
  `, `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-brand" onclick="saveCliente('${c.id||''}')">Guardar</button>`);
}
function saveCliente(id){
  const nome = document.getElementById('clNome').value.trim();
  if(!nome){ toast('Indique o nome do cliente','err'); return; }
  const data = {
    nome, telefone: document.getElementById('clTelefone').value.trim(), email: document.getElementById('clEmail').value.trim(),
    morada: document.getElementById('clMorada').value.trim(), nif: document.getElementById('clNif').value.trim(),
    empresa: document.getElementById('clEmpresa').value.trim(), obs: document.getElementById('clObs').value.trim()
  };
  if(id){ Object.assign(DB.clientes.find(x=>x.id===id), data); }
  else{ data.id = uid('c'); DB.clientes.push(data); }
  saveDB(); closeModal(); renderClientesBody(); toast('Cliente guardado.','ok');
}
function delCliente(id){
  if(!confirm('Remover este cliente?')) return;
  DB.clientes = DB.clientes.filter(x=>x.id!==id); saveDB(); renderClientesBody();
}
function viewCliente(id){
  const c = DB.clientes.find(x=>x.id===id);
  const alugueres = DB.alugueres.filter(a=>a.cliente_id===id);
  const facturas = DB.facturas.filter(f=>f.cliente_id===id);
  openModal(c.nome, `
    <p style="font-size:13px"><b>Telefone:</b> ${escapeHtml(c.telefone)||'-'}</p>
    <p style="font-size:13px"><b>Email:</b> ${escapeHtml(c.email)||'-'}</p>
    <p style="font-size:13px"><b>Morada:</b> ${escapeHtml(c.morada)||'-'}</p>
    <p style="font-size:13px"><b>NIF:</b> ${escapeHtml(c.nif)||'-'}</p>
    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
    <h4 style="margin-bottom:6px">Histórico de Alugueres (${alugueres.length})</h4>
    ${alugueres.length? alugueres.map(a=>`<div style="font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--border)">${fmtDate(a.dataEvento)} — ${a.itens.length} item(s) — <span class="badge muted">${a.status}</span></div>`).join('') : '<p style="font-size:12px;color:var(--text-mut)">Sem histórico</p>'}
    <h4 style="margin:12px 0 6px">Facturas emitidas (${facturas.length})</h4>
    ${facturas.length? facturas.map(f=>`<div style="font-size:12.5px;padding:5px 0;border-bottom:1px solid var(--border)">Nº ${f.numero} — ${fmtDate(f.data)} — ${fmtMoney(f.total)}</div>`).join('') : '<p style="font-size:12px;color:var(--text-mut)">Sem facturas</p>'}
  `, `<button class="btn btn-brand" onclick="closeModal()">Fechar</button>`, true);
}

// ============ FACTURAS PROFORMA ============
let novaFacturaItens = [];
function renderFacturas(){
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="toolbar">
      <div class="search"><input id="fpSearch" placeholder="Pesquisar por cliente ou número..." oninput="renderFacturasBody()"></div>
      <button class="btn btn-brand" onclick="openFacturaForm()">+ Nova Factura Proforma</button>
    </div>
    <div class="table-wrap"><table><thead><tr>
      <th>Nº</th><th>Cliente</th><th>Data</th><th>Total</th><th>Status</th><th></th>
    </tr></thead><tbody id="fpTbody"></tbody></table></div>
  `;
  renderFacturasBody();
}
function renderFacturasBody(){
  const q = (document.getElementById('fpSearch').value||'').toLowerCase();
  const rows = DB.facturas.filter(f=>!q || (clienteNome(f.cliente_id)+f.numero).toLowerCase().includes(q)).sort((a,b)=>b.numero-a.numero);
  document.getElementById('fpTbody').innerHTML = rows.length? rows.map(f=>`
    <tr>
      <td><b>#${String(f.numero).padStart(4,'0')}</b></td>
      <td>${escapeHtml(clienteNome(f.cliente_id))}</td>
      <td>${fmtDate(f.data)}</td>
      <td>${fmtMoney(f.total)}</td>
      <td><span class="badge ${f.status==='paga'?'ok':f.status==='pendente'?'warn':'info'}">${f.status}</span></td>
      <td style="white-space:nowrap">
        <button class="btn btn-sm" onclick="viewFactura('${f.id}')">👁</button>
        <button class="btn btn-sm btn-turq" onclick="exportFacturaPDF('${f.id}')">PDF</button>
        <button class="btn btn-sm btn-danger" onclick="delFactura('${f.id}')">🗑</button>
      </td>
    </tr>`).join('') : `<tr><td colspan="6"><div class="empty-state"><div class="em-ic">🧾</div><div class="em-t">Nenhuma factura emitida</div></div></td></tr>`;
}
function openFacturaForm(){
  novaFacturaItens = [];
  const clientesOpts = DB.clientes.map(c=>`<option value="${c.id}">${escapeHtml(c.nome)}</option>`).join('');
  const allMats = [...DB.materiaisFixos.map(m=>({id:m.id,nome:m.nome,preco:m.valor})), ...DB.alugaveis.map(m=>({id:m.id,nome:m.nome,preco:m.precoDia}))];
  openModal('Nova Factura Proforma', `
    <div class="form-row">
      <div class="field"><label>Cliente</label><select id="fpCliente">${clientesOpts||'<option>Sem clientes</option>'}</select></div>
      <div class="field"><label>Data</label><input type="date" id="fpData" value="${todayISO()}"></div>
    </div>
    <hr style="border:none;border-top:1px solid var(--border);margin:12px 0">
    <div class="form-row">
      <div class="field"><label>Material / Serviço</label>
        <select id="fpItemSel">${allMats.map(m=>`<option value="${m.id}|${m.preco}">${escapeHtml(m.nome)}</option>`).join('')}</select>
      </div>
      <div class="field"><label>Quantidade</label><input type="number" id="fpItemQtd" value="1" min="1"></div>
    </div>
    <button class="btn btn-turq btn-sm" onclick="addItemFactura()">+ Adicionar</button>
    <div id="fpItensList" style="margin-top:10px"></div>
    <div class="form-row" style="margin-top:12px">
      <div class="field"><label>IVA (%)</label><input type="number" id="fpIva" value="${DB.config.iva}" oninput="renderTotaisFactura()"></div>
      <div class="field"><label>Desconto (${DB.config.moeda})</label><input type="number" id="fpDesconto" value="0" oninput="renderTotaisFactura()"></div>
    </div>
    <div id="fpTotais" style="text-align:right;font-size:13.5px;margin-top:8px"></div>
    <div class="field" style="margin-top:10px"><label>Observações</label><textarea id="fpObs" rows="2"></textarea></div>
  `, `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-brand" onclick="saveFactura()">Gerar Factura</button>`, true);
  renderItensFacturaList();
}
function addItemFactura(){
  const [id, preco] = document.getElementById('fpItemSel').value.split('|');
  const qtd = Number(document.getElementById('fpItemQtd').value)||1;
  const opt = document.getElementById('fpItemSel').selectedOptions[0].textContent;
  novaFacturaItens.push({item_id:id, nome:opt, qtd, precoUnit:Number(preco)});
  renderItensFacturaList();
}
function removeItemFactura(idx){ novaFacturaItens.splice(idx,1); renderItensFacturaList(); }
function renderItensFacturaList(){
  const box = document.getElementById('fpItensList');
  box.innerHTML = novaFacturaItens.length? `<table style="width:100%;font-size:12.5px"><thead><tr><th style="text-align:left">Item</th><th>Qtd</th><th>Preço</th><th>Subtotal</th><th></th></tr></thead><tbody>
    ${novaFacturaItens.map((it,idx)=>`<tr>
      <td>${escapeHtml(it.nome)}</td>
      <td style="text-align:center"><input type="number" value="${it.qtd}" style="width:55px" onchange="novaFacturaItens[${idx}].qtd=Number(this.value); renderItensFacturaList()"></td>
      <td style="text-align:center"><input type="number" value="${it.precoUnit}" style="width:75px" onchange="novaFacturaItens[${idx}].precoUnit=Number(this.value); renderItensFacturaList()"></td>
      <td style="text-align:center">${fmtMoney(it.qtd*it.precoUnit)}</td>
      <td><button class="btn btn-sm btn-danger" onclick="removeItemFactura(${idx})">✕</button></td>
    </tr>`).join('')}
  </tbody></table>` : `<div style="font-size:12.5px;color:var(--text-mut)">Nenhum item adicionado.</div>`;
  renderTotaisFactura();
}
function renderTotaisFactura(){
  const box = document.getElementById('fpTotais');
  if(!box) return;
  const subtotal = novaFacturaItens.reduce((s,i)=>s+i.qtd*i.precoUnit,0);
  const iva = Number(document.getElementById('fpIva')?.value)||0;
  const desconto = Number(document.getElementById('fpDesconto')?.value)||0;
  const valorIva = subtotal*iva/100;
  const total = Math.max(subtotal + valorIva - desconto, 0);
  box.innerHTML = `Subtotal: ${fmtMoney(subtotal)}<br>IVA (${iva}%): ${fmtMoney(valorIva)}<br>Desconto: -${fmtMoney(desconto)}<br><b style="font-size:16px;color:var(--roxo)">Total: ${fmtMoney(total)}</b>`;
}
function saveFactura(){
  const clienteId = document.getElementById('fpCliente').value;
  if(!clienteId){ toast('Selecione um cliente','err'); return; }
  if(novaFacturaItens.length===0){ toast('Adicione pelo menos um item','err'); return; }
  const subtotal = novaFacturaItens.reduce((s,i)=>s+i.qtd*i.precoUnit,0);
  const iva = Number(document.getElementById('fpIva').value)||0;
  const desconto = Number(document.getElementById('fpDesconto').value)||0;
  const total = Math.max(subtotal + subtotal*iva/100 - desconto, 0);
  const factura = {
    id: uid('fp'), numero: DB.config.proximoNumFactura, cliente_id: clienteId, data: document.getElementById('fpData').value,
    itens: novaFacturaItens, iva, desconto, subtotal, total, obs: document.getElementById('fpObs').value.trim(), status:'emitida'
  };
  DB.config.proximoNumFactura++;
  DB.facturas.push(factura);
  saveDB(); closeModal(); renderFacturasBody(); toast('Factura Proforma gerada com sucesso.','ok');
}
function delFactura(id){
  if(!confirm('Remover esta factura?')) return;
  DB.facturas = DB.facturas.filter(x=>x.id!==id); saveDB(); renderFacturasBody();
}
function viewFactura(id){
  const f = DB.facturas.find(x=>x.id===id);
  const cli = DB.clientes.find(c=>c.id===f.cliente_id);
  openModal('Factura Proforma #'+String(f.numero).padStart(4,'0'), `
    <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">
      <img src="${LOGO_B64}" style="width:50px">
      <div>
        <div style="font-weight:800">${escapeHtml(DB.config.empresa.nome)}</div>
        <div style="font-size:11px;color:var(--text-mut)">${escapeHtml(DB.config.empresa.telefone)} · ${escapeHtml(DB.config.empresa.email)}</div>
      </div>
    </div>
    <p style="font-size:13px"><b>Cliente:</b> ${escapeHtml(cli?cli.nome:'-')}</p>
    <p style="font-size:13px"><b>Data:</b> ${fmtDate(f.data)}</p>
    <table style="width:100%;font-size:12.5px;margin-top:10px"><thead><tr><th style="text-align:left">Item</th><th>Qtd</th><th>Preço</th><th>Subtotal</th></tr></thead><tbody>
    ${f.itens.map(i=>`<tr><td>${escapeHtml(i.nome)}</td><td style="text-align:center">${i.qtd}</td><td style="text-align:center">${fmtMoney(i.precoUnit)}</td><td style="text-align:center">${fmtMoney(i.qtd*i.precoUnit)}</td></tr>`).join('')}
    </tbody></table>
    <div style="text-align:right;margin-top:10px;font-size:13px">
      Subtotal: ${fmtMoney(f.subtotal)}<br>IVA (${f.iva}%): ${fmtMoney(f.subtotal*f.iva/100)}<br>Desconto: -${fmtMoney(f.desconto)}<br>
      <b style="font-size:16px;color:var(--roxo)">Total: ${fmtMoney(f.total)}</b>
    </div>
    <div class="field" style="margin-top:12px"><label>Status</label>
      <select onchange="updateFacturaStatus('${f.id}',this.value)">
        <option value="emitida" ${f.status==='emitida'?'selected':''}>Emitida</option>
        <option value="paga" ${f.status==='paga'?'selected':''}>Paga</option>
        <option value="pendente" ${f.status==='pendente'?'selected':''}>Pendente</option>
      </select>
    </div>
  `, `<button class="btn" onclick="closeModal()">Fechar</button>
      <button class="btn btn-turq" onclick="exportFacturaPDF('${f.id}')">📄 Exportar PDF</button>
      <button class="btn btn-brand" onclick="printFactura('${f.id}')">🖨 Imprimir</button>`, true);
}
function updateFacturaStatus(id, status){
  DB.facturas.find(x=>x.id===id).status = status; saveDB(); renderFacturasBody(); toast('Status atualizado.','ok');
}
function exportFacturaPDF(id){
  const f = DB.facturas.find(x=>x.id===id);
  const cli = DB.clientes.find(c=>c.id===f.cliente_id);
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  try{ doc.addImage(LOGO_B64, 'PNG', 15, 12, 22, 22); }catch(e){}
  doc.setFontSize(16); doc.setTextColor(91,42,134);
  doc.text(DB.config.empresa.nome, 42, 20);
  doc.setFontSize(9); doc.setTextColor(100);
  doc.text(`${DB.config.empresa.telefone}  |  ${DB.config.empresa.email}`, 42, 26);
  doc.text(`NIF: ${DB.config.empresa.nif}  |  ${DB.config.empresa.endereco}`, 42, 31);
  doc.setDrawColor(220); doc.line(15,38,195,38);
  doc.setFontSize(13); doc.setTextColor(20);
  doc.text(`FACTURA PROFORMA Nº ${String(f.numero).padStart(4,'0')}`, 15, 48);
  doc.setFontSize(10);
  doc.text(`Cliente: ${cli?cli.nome:'-'}`, 15, 56);
  doc.text(`Data: ${fmtDate(f.data)}`, 150, 56);
  const body = f.itens.map(i=>[i.nome, i.qtd, fmtMoney(i.precoUnit), fmtMoney(i.qtd*i.precoUnit)]);
  doc.autoTable({
    startY:62, head:[['Material','Qtd','Preço Unit.','Subtotal']], body,
    headStyles:{fillColor:[91,42,134]}, styles:{fontSize:9}
  });
  let y = doc.lastAutoTable.finalY + 8;
  doc.setFontSize(10);
  doc.text(`Subtotal: ${fmtMoney(f.subtotal)}`, 150, y); y+=6;
  doc.text(`IVA (${f.iva}%): ${fmtMoney(f.subtotal*f.iva/100)}`, 150, y); y+=6;
  doc.text(`Desconto: -${fmtMoney(f.desconto)}`, 150, y); y+=8;
  doc.setFontSize(13); doc.setTextColor(91,42,134);
  doc.text(`Total: ${fmtMoney(f.total)}`, 150, y);
  y += 20;
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text('Assinatura: _______________________', 15, y);
  doc.text('Yolandia Decorações — Criamos · Decoramos · Encantamos', 15, 285);
  doc.save(`Factura_Proforma_${String(f.numero).padStart(4,'0')}.pdf`);
  toast('PDF exportado.','ok');
}
function printFactura(id){
  exportFacturaPDF(id);
}

let financeiroTab = 'resumo';
function renderFinanceiro(){
  const c = document.getElementById('content');
  c.innerHTML = `
    <div class="tabs">
      <button class="${financeiroTab==='resumo'?'active':''}" onclick="setFinTab('resumo')">Resumo</button>
      <button class="${financeiroTab==='receitas'?'active':''}" onclick="setFinTab('receitas')">Receitas</button>
      <button class="${financeiroTab==='despesas'?'active':''}" onclick="setFinTab('despesas')">Despesas</button>
      <button class="${financeiroTab==='fluxo'?'active':''}" onclick="setFinTab('fluxo')">Fluxo de Caixa</button>
    </div>
    <div id="finBody"></div>
  `;
  renderFinBody();
}
function setFinTab(t){ financeiroTab=t; renderFinanceiro(); }
function finIndicadores(){
  const receitaTotal = DB.facturas.reduce((s,f)=>s+Number(f.total||0),0);
  const receitaPaga = DB.facturas.filter(f=>f.status==='paga').reduce((s,f)=>s+Number(f.total||0),0);
  const receitaPendente = DB.facturas.filter(f=>f.status!=='paga').reduce((s,f)=>s+Number(f.total||0),0);
  const adiantamentos = DB.adiantamentos.reduce((s,a)=>s+Number(a.valor||0),0);
  const despesaTotal = DB.despesas.reduce((s,d)=>s+Number(d.valor||0),0);
  const lucroLiquido = receitaPaga - despesaTotal;
  const ticketMedio = DB.clientes.length? receitaTotal/DB.clientes.length : 0;
  return {receitaTotal, receitaPaga, receitaPendente, adiantamentos, despesaTotal, lucroLiquido, ticketMedio};
}
function renderFinBody(){
  const el = document.getElementById('finBody');
  const k = finIndicadores();
  if(financeiroTab==='resumo'){
    el.innerHTML = `
      <div class="grid grid-4">
        ${statCard('💵', COLORS.roxo, fmtMoney(k.receitaTotal), 'Receita total (facturas)')}
        ${statCard('✅', '#1FA96A', fmtMoney(k.receitaPaga), 'Facturas pagas')}
        ${statCard('⏳', COLORS.amarelo, fmtMoney(k.receitaPendente), 'Valores pendentes')}
        ${statCard('🤝', COLORS.turquesa, fmtMoney(k.adiantamentos), 'Adiantamentos recebidos')}
      </div>
      <div class="grid grid-4" style="margin-top:16px">
        ${statCard('📉', '#E3453A', fmtMoney(k.despesaTotal), 'Despesas totais')}
        ${statCard('📈', '#1FA96A', fmtMoney(k.lucroLiquido), 'Lucro líquido')}
        ${statCard('🎟️', COLORS.rosa, fmtMoney(k.ticketMedio), 'Ticket médio por cliente')}
        ${statCard('🎪', COLORS.roxo, DB.alugueres.length, 'Total de alugueres')}
      </div>
      <div class="card" style="margin-top:20px">
        <h3 style="margin-bottom:12px">Receitas vs Despesas (últimos 6 meses)</h3>
        <canvas id="chartFinanceiro" height="90"></canvas>
      </div>`;
    setTimeout(()=>{
      const months = []; const receitas=[]; const despesas=[];
      const now = new Date();
      for(let i=5;i>=0;i--){
        const d = new Date(now.getFullYear(), now.getMonth()-i, 1);
        months.push(d.toLocaleDateString('pt-PT',{month:'short'}));
        const r = DB.facturas.filter(f=>{const fd=new Date(f.data); return fd.getFullYear()===d.getFullYear() && fd.getMonth()===d.getMonth();}).reduce((s,f)=>s+Number(f.total||0),0);
        const de = DB.despesas.filter(x=>{const xd=new Date(x.data); return xd.getFullYear()===d.getFullYear() && xd.getMonth()===d.getMonth();}).reduce((s,x)=>s+Number(x.valor||0),0);
        receitas.push(r); despesas.push(de);
      }
      new Chart(document.getElementById('chartFinanceiro'),{
        type:'line',
        data:{labels:months, datasets:[
          {label:'Receitas', data:receitas, borderColor:COLORS.turquesa, backgroundColor:COLORS.turquesa+'33', fill:true, tension:.3},
          {label:'Despesas', data:despesas, borderColor:COLORS.rosa, backgroundColor:COLORS.rosa+'33', fill:true, tension:.3}
        ]},
        options:{plugins:{legend:{position:'bottom'}}}
      });
    },30);
  } else if(financeiroTab==='receitas'){
    el.innerHTML = `
      <div class="toolbar"><button class="btn btn-brand" onclick="openAdiantamentoForm()">+ Registar Adiantamento</button></div>
      <div class="grid grid-2">
        <div class="card">
          <h3 style="margin-bottom:10px">Facturas</h3>
          <div class="table-wrap"><table><thead><tr><th>Nº</th><th>Cliente</th><th>Total</th><th>Status</th></tr></thead><tbody>
          ${DB.facturas.length? DB.facturas.map(f=>`<tr><td>#${String(f.numero).padStart(4,'0')}</td><td>${escapeHtml(clienteNome(f.cliente_id))}</td><td>${fmtMoney(f.total)}</td><td><span class="badge ${f.status==='paga'?'ok':'warn'}">${f.status}</span></td></tr>`).join('') : '<tr><td colspan="4"><div class="empty-state"><div class="em-t">Sem facturas</div></div></td></tr>'}
          </tbody></table></div>
        </div>
        <div class="card">
          <h3 style="margin-bottom:10px">Adiantamentos</h3>
          <div class="table-wrap"><table><thead><tr><th>Cliente</th><th>Valor</th><th>Data</th></tr></thead><tbody>
          ${DB.adiantamentos.length? DB.adiantamentos.map(a=>`<tr><td>${escapeHtml(clienteNome(a.cliente_id))}</td><td>${fmtMoney(a.valor)}</td><td>${fmtDate(a.data)}</td></tr>`).join('') : '<tr><td colspan="3"><div class="empty-state"><div class="em-t">Sem adiantamentos</div></div></td></tr>'}
          </tbody></table></div>
        </div>
      </div>`;
  } else if(financeiroTab==='despesas'){
    el.innerHTML = `
      <div class="toolbar"><button class="btn btn-brand" onclick="openDespesaForm()">+ Registar Despesa</button></div>
      <div class="table-wrap"><table><thead><tr><th>Data</th><th>Categoria</th><th>Descrição</th><th>Valor</th><th></th></tr></thead><tbody id="despTbody"></tbody></table></div>`;

      <tr><td>${fmtDate(d.data)}</td><td><span class="badge purple">${escapeHtml(d.categoria)}</span></td><td>${escapeHtml(d.descricao)}</td><td>${fmtMoney(d.valor)}</td>

  } else {
    // fluxo de caixa
    const hoje = todayISO();
    const entradasHoje = DB.facturas.filter(f=>f.data===hoje).reduce((s,f)=>s+Number(f.total||0),0) + DB.adiantamentos.filter(a=>a.data===hoje).reduce((s,a)=>s+Number(a.valor||0),0);
    const saidasHoje = DB.despesas.filter(d=>d.data===hoje).reduce((s,d)=>s+Number(d.valor||0),0);
    const now = new Date();
    const entradasMes = DB.facturas.filter(f=>{const d=new Date(f.data); return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();}).reduce((s,f)=>s+Number(f.total||0),0);
    const saidasMes = DB.despesas.filter(d=>{const dd=new Date(d.data); return dd.getMonth()===now.getMonth()&&dd.getFullYear()===now.getFullYear();}).reduce((s,d)=>s+Number(d.valor||0),0);
    const entradasAno = DB.facturas.filter(f=>new Date(f.data).getFullYear()===now.getFullYear()).reduce((s,f)=>s+Number(f.total||0),0);
    const saidasAno = DB.despesas.filter(d=>new Date(d.data).getFullYear()===now.getFullYear()).reduce((s,d)=>s+Number(d.valor||0),0);
    el.innerHTML = `
      <div class="grid grid-3">
        <div class="card"><h4>Saldo Diário</h4><p style="font-size:12px;color:var(--text-mut);margin:6px 0">Entradas: ${fmtMoney(entradasHoje)} · Saídas: ${fmtMoney(saidasHoje)}</p><div class="stat-val" style="color:${entradasHoje-saidasHoje>=0?'var(--ok)':'var(--danger)'}">${fmtMoney(entradasHoje-saidasHoje)}</div></div>
        <div class="card"><h4>Saldo Mensal</h4><p style="font-size:12px;color:var(--text-mut);margin:6px 0">Entradas: ${fmtMoney(entradasMes)} · Saídas: ${fmtMoney(saidasMes)}</p><div class="stat-val" style="color:${entradasMes-saidasMes>=0?'var(--ok)':'var(--danger)'}">${fmtMoney(entradasMes-saidasMes)}</div></div>
        <div class="card"><h4>Saldo Anual</h4><p style="font-size:12px;color:var(--text-mut);margin:6px 0">Entradas: ${fmtMoney(entradasAno)} · Saídas: ${fmtMoney(saidasAno)}</p><div class="stat-val" style="color:${entradasAno-saidasAno>=0?'var(--ok)':'var(--danger)'}">${fmtMoney(entradasAno-saidasAno)}</div></div>
      </div>`;
  }

function renderDanos(){
  const c = document.getElementById('content');
  c.innerHTML = `

      <th>Data</th><th>Material</th><th>Cliente</th><th>Qtd</th><th>Estado</th><th>Prejuízo</th><th></th>
    </tr></thead><tbody id="dnTbody"></tbody></table></div>
  `;
  renderDanosBody();
}
function renderDanosBody(){
  const q = (document.getElementById('dnSearch').value||'').toLowerCase();
  const rows = DB.ocorrencias.filter(o=>!q || (o.materialNome+clienteNome(o.cliente_id)).toLowerCase().includes(q)).sort((a,b)=>b.data.localeCompare(a.data));
  const totalPrejuizo = DB.ocorrencias.reduce((s,o)=>s+Number(o.valorPrejuizo||0),0);
  const nDanificado = DB.ocorrencias.filter(o=>o.estado==='danificado').length;
  const nPerdido = DB.ocorrencias.filter(o=>o.estado==='perdido').length;
  const nExtraviado = DB.ocorrencias.filter(o=>o.estado==='extraviado').length;
  document.getElementById('dnStats').innerHTML = `
    ${statCard('💥', '#E3453A', nDanificado, 'Materiais danificados')}
    ${statCard('❓', COLORS.amarelo, nPerdido, 'Materiais perdidos')}
    ${statCard('🚫', COLORS.roxo, nExtraviado, 'Extraviados')}
    ${statCard('💸', '#E3453A', fmtMoney(totalPrejuizo), 'Custo total dos prejuízos')}
  `;
  document.getElementById('dnTbody').innerHTML = rows.length? rows.map(o=>`
    <tr>
      <td>${fmtDate(o.data)}</td>
      <td>${escapeHtml(o.materialNome)}</td>
      <td>${escapeHtml(clienteNome(o.cliente_id))}</td>
      <td>${o.quantidade}</td>
      <td>${ocorrenciaBadge(o.estado)}</td>
      <td>${fmtMoney(o.valorPrejuizo)}</td>
      <td style="white-space:nowrap"><button class="btn btn-sm" onclick="viewOcorrencia('${o.id}')">👁</button> <button class="btn btn-sm btn-danger" onclick="delOcorrencia('${o.id}')">🗑</button></td>
    </tr>`).join('') : `<tr><td colspan="7"><div class="empty-state"><div class="em-ic">⚠️</div><div class="em-t">Nenhuma ocorrência registada</div></div></td></tr>`;

  // alerta materiais frequentemente danificados
  const contagem = {};
  DB.ocorrencias.forEach(o=>{ contagem[o.materialNome] = (contagem[o.materialNome]||0)+1; });
  const frequentes = Object.entries(contagem).filter(([k,v])=>v>=3);
  if(frequentes.length){
    const box = document.createElement('div');
    box.className='card'; box.style.marginTop='16px';
    box.innerHTML = `<h3 style="margin-bottom:8px">🔧 Sugestão de manutenção preventiva</h3>` + frequentes.map(([n,v])=>`<div style="font-size:12.5px;padding:6px 0;border-bottom:1px solid var(--border)">${escapeHtml(n)} — ${v} ocorrências registadas. Considere manutenção ou substituição.</div>`).join('');
    document.getElementById('dnTbody').closest('.table-wrap').after(box);
  }
}
function ocorrenciaBadge(estado){
  const map = {danificado:['danger','Danificado'], perdido:['warn','Perdido'], extraviado:['muted','Extraviado'], reparacao:['info','Em reparação'], recuperado:['ok','Recuperado']};
  const [cls,lbl] = map[estado]||['muted',estado];
  return `<span class="badge ${cls}">${lbl}</span>`;
}

function exportRelatorioCSV(){
  let csv = 'Relatório Yolandia Decorações\n\n';
  csv += 'Materiais mais alugados\nMaterial,Quantidade\n';
  const materiaisMaisAlugados = {};
  DB.alugueres.forEach(a=>a.itens.forEach(i=>{ materiaisMaisAlugados[i.nome] = (materiaisMaisAlugados[i.nome]||0)+Number(i.qtd); }));
  Object.entries(materiaisMaisAlugados).forEach(([n,v])=>{ csv += `"${n}",${v}\n`; });
  csv += '\nFacturas\nNúmero,Cliente,Data,Total,Status\n';
  DB.facturas.forEach(f=>{ csv += `${f.numero},"${clienteNome(f.cliente_id)}",${f.data},${f.total},${f.status}\n`; });
  csv += '\nDespesas\nData,Categoria,Descrição,Valor\n';
  DB.despesas.forEach(d=>{ csv += `${d.data},"${d.categoria}","${d.descricao}",${d.valor}\n`; });
  csv += '\nOcorrências (Danos/Perdas)\nData,Material,Estado,Quantidade,Prejuízo\n';
  DB.ocorrencias.forEach(o=>{ csv += `${o.data},"${o.materialNome}",${o.estado},${o.quantidade},${o.valorPrejuizo}\n`; });
  const blob = new Blob(["\uFEFF"+csv], {type:'text/csv;charset=utf-8;'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'Relatorio_Yolandia_Decoracoes.csv';
  link.click();
  toast('Relatório exportado em CSV.','ok');
}
function exportRelatorioPDF(){
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  try{ doc.addImage(LOGO_B64, 'PNG', 15, 10, 18, 18); }catch(e){}
  doc.setFontSize(15); doc.setTextColor(91,42,134);
  doc.text('Relatório Geral — Yolandia Decorações', 38, 20);
  doc.setFontSize(9); doc.setTextColor(120);
  doc.text('Gerado em '+new Date().toLocaleDateString('pt-PT'), 38, 26);
  let y = 38;
  doc.setFontSize(11); doc.setTextColor(20); doc.text('Materiais mais alugados', 15, y); y+=4;
  const materiaisMaisAlugados = {};
  DB.alugueres.forEach(a=>a.itens.forEach(i=>{ materiaisMaisAlugados[i.nome] = (materiaisMaisAlugados[i.nome]||0)+Number(i.qtd); }));
  doc.autoTable({startY:y, head:[['Material','Qtd']], body:Object.entries(materiaisMaisAlugados), headStyles:{fillColor:[91,42,134]}, styles:{fontSize:9}});
  y = doc.lastAutoTable.finalY + 10;
  doc.text('Facturas emitidas', 15, y); y+=4;
  doc.autoTable({startY:y, head:[['Nº','Cliente','Data','Total','Status']], body:DB.facturas.map(f=>[f.numero, clienteNome(f.cliente_id), fmtDate(f.data), fmtMoney(f.total), f.status]), headStyles:{fillColor:[23,169,176]}, styles:{fontSize:8}});
  doc.save('Relatorio_Yolandia_Decoracoes.pdf');
  toast('Relatório exportado em PDF.','ok');
}

        <h3 style="margin-bottom:12px">👤 Utilizadores</h3>
        <div id="cfUsersList"></div>
        <button class="btn btn-brand btn-sm" style="margin-top:10px" onclick="openUserForm()">+ Novo Utilizador</button>
      </div>
    </div>
  `;
  renderUsersList();
}
function saveConfigEmpresa(){
  DB.config.empresa = {
    nome: document.getElementById('cfNome').value.trim() || 'Yolandia Decorações',
    telefone: document.getElementById('cfTelefone').value.trim(),
    email: document.getElementById('cfEmail').value.trim(),
    nif: document.getElementById('cfNif').value.trim(),
    endereco: document.getElementById('cfEndereco').value.trim()
  };
  saveDB(); toast('Dados da empresa atualizados.','ok');
}
function saveConfigGeral(){
  DB.config.iva = Number(document.getElementById('cfIva').value)||0;
  DB.config.moeda = document.getElementById('cfMoeda').value.trim()||'AOA';
  DB.config.tema = document.getElementById('cfTema').value;
  saveDB(); applyTheme(); toast('Configurações atualizadas.','ok');
}
function exportBackup(){
  const blob = new Blob([JSON.stringify(DB,null,2)], {type:'application/json'});
  const link = document.createElement('a');
  link.href = URL.createObjectURL(blob);
  link.download = 'backup_yolandia_'+todayISO()+'.json';
  link.click();
  toast('Backup exportado.','ok');
}
function importBackup(input){
  const f = input.files[0]; if(!f) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      if(!data.clientes || !data.config){ toast('Ficheiro de backup inválido.','err'); return; }
      DB = data; saveDB();
      toast('Backup restaurado com sucesso.','ok');
      navigate('dashboard');
    }catch(err){ toast('Erro ao ler o ficheiro de backup.','err'); }
  };
  reader.readAsText(f);
}
function renderUsersList(){
  document.getElementById('cfUsersList').innerHTML = DB.users.map(u=>`
    <div style="display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px">
      <span><b>${escapeHtml(u.nome)}</b> <span class="badge muted">${u.tipo}</span></span>
      <button class="btn btn-sm btn-danger" onclick="delUser('${u.id}')">🗑</button>
    </div>`).join('');
}
function openUserForm(){
  openModal('Novo Utilizador', `
    <div class="field"><label>Nome</label><input id="usNome"></div>
    <div class="form-row">
      <div class="field"><label>Utilizador</label><input id="usUser"></div>
      <div class="field"><label>Senha</label><input id="usPass" type="password"></div>
    </div>
    <div class="field"><label>Perfil</label><select id="usTipo"><option value="funcionario">Funcionário</option><option value="admin">Administrador</option></select></div>
  `, `<button class="btn" onclick="closeModal()">Cancelar</button><button class="btn btn-brand" onclick="saveUser()">Guardar</button>`);
}
function saveUser(){
  const nome = document.getElementById('usNome').value.trim();
  const user = document.getElementById('usUser').value.trim();
  const senha = document.getElementById('usPass').value.trim();
  if(!nome || !user || !senha){ toast('Preencha todos os campos','err'); return; }
  DB.users.push({id:uid('u'), nome, user, senha, tipo:document.getElementById('usTipo').value});
  saveDB(); closeModal(); renderUsersList(); toast('Utilizador criado.','ok');
}
function delUser(id){
  if(DB.users.length<=1){ toast('É necessário manter pelo menos um utilizador.','err'); return; }
  if(!confirm('Remover este utilizador?')) return;
  DB.users = DB.users.filter(x=>x.id!==id); saveDB(); renderUsersList();
}

// ============ INIT ============
function init(){
  loadDB();
  document.getElementById('yrNow').textContent = new Date().getFullYear();
  document.getElementById('loginLogo').src = LOGO_B64;
  document.getElementById('sideLogo').src = LOGO_B64;
  applyTheme();
  if(DB.currentUser && DB.users.find(u=>u.id===DB.currentUser)){
    enterApp();
  }
}
init();
</script>
</body>
</html>
